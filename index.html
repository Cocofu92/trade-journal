<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velox Capital — Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f11;--bg2:#13161a;--bg3:#1a1e24;--border:#2a2f38;--text:#c8cdd5;--text2:#8891a0;--accent:#e63946;--green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--blue:#3498db;--mono:'JetBrains Mono',monospace;--serif:'Source Serif 4',Georgia,serif;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}::selection{background:var(--accent);color:#fff}
input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 10px;font-family:var(--mono);font-size:12px}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}select{cursor:pointer}
button{font-family:var(--mono);cursor:pointer;border:none;border-radius:4px;font-size:11px;padding:7px 14px;font-weight:600;transition:all .15s}button:hover{filter:brightness(1.15)}
.header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}.header-left .brand{font-size:10px;letter-spacing:4px;color:var(--accent);font-weight:700}.header-left h1{font-family:var(--serif);font-size:18px;font-weight:400;color:#fff;margin-top:2px}.header-right{display:flex;gap:8px;align-items:center}.header-right button{background:var(--bg3);color:var(--text2);border:1px solid var(--border);font-size:10px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}.tab{padding:10px 20px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}.tab:hover{color:var(--text)}.tab.active{color:#fff;border-bottom-color:var(--accent)}
.content{max-width:1300px;margin:0 auto;padding:20px}.dashboard-grid{display:grid;grid-template-columns:1fr 300px;gap:16px}.sidebar{display:flex;flex-direction:column;gap:12px}.sidebar-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px}.sidebar-card h4{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}.stat-card .label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}.stat-card .value{font-size:20px;font-weight:700;margin-top:4px;color:#fff}.stat-card .value.green{color:var(--green)}.stat-card .value.red{color:var(--red)}.stat-card .value.amber{color:var(--amber)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:12px}thead th{text-align:left;padding:8px 10px;font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}tbody td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}tbody tr:hover{background:var(--bg3)}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px}.tag-long{background:rgba(46,204,113,.15);color:var(--green)}.tag-short{background:rgba(231,76,60,.15);color:var(--red)}.tag-win{background:rgba(46,204,113,.15);color:var(--green)}.tag-loss{background:rgba(231,76,60,.15);color:var(--red)}.tag-breakeven{background:rgba(243,156,18,.15);color:var(--amber)}.tag-open{background:rgba(52,152,219,.15);color:var(--blue)}
.score{font-weight:700}.score-high{color:var(--green)}.score-med{color:var(--amber)}.score-low{color:var(--red)}
.form-section{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}.form-section h3{font-family:var(--serif);font-size:16px;color:#fff;margin-bottom:16px;font-weight:600}.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}.form-group{display:flex;flex-direction:column;gap:4px}.form-group label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}.form-group input,.form-group select,.form-group textarea{width:100%}.form-group textarea{min-height:60px;resize:vertical}.form-full{grid-column:1/-1}
.form-actions{margin-top:16px;display:flex;gap:10px}.btn-primary{background:var(--accent);color:#fff;padding:9px 24px;font-size:12px}.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:4px 10px;font-size:10px}
.calc-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}.calc-item .label{font-size:10px;color:var(--text2)}.calc-item .val{font-size:16px;font-weight:700;color:#fff;margin-top:2px}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.score-item{display:flex;flex-direction:column;gap:4px}.score-item label{font-size:9px;color:var(--text2);letter-spacing:.5px}.score-item select{padding:5px;font-size:11px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}.section-header h3{font-family:var(--serif);font-size:16px;color:#fff;font-weight:600}.empty{text-align:center;padding:40px 20px;color:var(--text2)}.empty p{margin-top:8px;font-size:12px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px}.chart-card h4{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}.bar-label{width:60px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0}.bar-track{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden}.bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:#fff;min-width:20px}.bar-fill.green{background:var(--green)}.bar-fill.red{background:var(--red)}
.wl-grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden}.wl-row{display:grid;grid-template-columns:110px 100px 1fr 60px;gap:0;background:var(--bg2);align-items:center}.wl-row.wl-header{background:var(--bg3)}.wl-row>div{padding:8px 10px;font-size:11px}.wl-inst{font-weight:600;color:#fff}.wl-note{color:var(--text2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}.status-nip{background:var(--border)}.status-watching{background:var(--blue)}.status-stalking{background:var(--amber)}.status-live{background:var(--green)}.status-tp{background:var(--accent)}
.risk-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}.risk-row:last-child{border-bottom:none}.risk-pct{font-size:10px;color:var(--text2);margin-left:4px}
.corr-table{width:100%;border-collapse:collapse;font-size:9px}.corr-table th,.corr-table td{padding:4px 3px;text-align:center;border:1px solid var(--border)}.corr-table th{color:var(--text2);font-weight:600;background:var(--bg3)}.corr-high{background:rgba(231,76,60,.2);color:var(--red);font-weight:700}.corr-med{background:rgba(243,156,18,.15);color:var(--amber)}.corr-low{background:rgba(52,152,219,.1);color:var(--text2)}.corr-neg{background:rgba(46,204,113,.1);color:var(--green)}.corr-self{background:var(--bg3);color:var(--text2)}
.equity-input{display:flex;gap:6px;align-items:center;margin-bottom:10px}.equity-input input{width:120px;font-size:13px;font-weight:600}
@media(max-width:900px){.dashboard-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.chart-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}.score-grid{grid-template-columns:repeat(3,1fr)}.wl-row{grid-template-columns:90px 80px 1fr 50px}}
</style>
</head>
<body>
<div class="header"><div class="header-left"><div class="brand">VELOX CAPITAL</div><h1>Trade Journal</h1></div><div class="header-right"><span id="syncStatus" style="font-size:10px;color:var(--text2)"></span><button onclick="syncFromGitHub()">⟳ SYNC</button><button onclick="exportData()">⬇ EXPORT</button><button onclick="document.getElementById('importFile').click()">⬆ IMPORT</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"><button onclick="currentTab='settings';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));render();">⚙</button></div></div>
<div class="tabs" id="tabs"><div class="tab active" data-tab="dashboard">Dashboard</div><div class="tab" data-tab="watchlist">Watchlist</div><div class="tab" data-tab="new">+ New Trade</div><div class="tab" data-tab="open">Open</div><div class="tab" data-tab="journal">Journal</div><div class="tab" data-tab="stats">Stats</div></div>
<div class="content" id="content"></div>
<script>
const INSTRUMENTS=['Brent','Nat Gas','Gold','Silver','Copper','S&P 500','Nasdaq 100','FTSE 100','DAX 40','Nikkei 225','Bitcoin'];
const INST_SHORT={Brent:'BRT','Nat Gas':'NG',Gold:'XAU',Silver:'XAG',Copper:'HG','S&P 500':'SPX','Nasdaq 100':'NQ','FTSE 100':'FTSE','DAX 40':'DAX','Nikkei 225':'NKY',Bitcoin:'BTC'};
const CRITERIA=['Trend','Squeeze','VWAP','RSI','EMA Align'],TIMEFRAMES=['1H','4H','Daily','Weekly'];
const STATUSES=['NOT IN PLAY','WATCHING','STALKING','LIVE','TAKING PROFIT'];
const STATUS_CSS={'NOT IN PLAY':'nip',WATCHING:'watching',STALKING:'stalking',LIVE:'live','TAKING PROFIT':'tp'};
const MARGIN_MAP={Brent:{class:'Commodities',margin:5,leverage:'1:20'},'Nat Gas':{class:'Commodities',margin:5,leverage:'1:20'},Gold:{class:'Commodities',margin:5,leverage:'1:20'},Silver:{class:'Commodities',margin:5,leverage:'1:20'},Copper:{class:'Commodities',margin:5,leverage:'1:20'},'S&P 500':{class:'Indices',margin:5,leverage:'1:20'},'Nasdaq 100':{class:'Indices',margin:5,leverage:'1:20'},'FTSE 100':{class:'Indices',margin:5,leverage:'1:20'},'DAX 40':{class:'Indices',margin:5,leverage:'1:20'},'Nikkei 225':{class:'Indices',margin:5,leverage:'1:20'},Bitcoin:{class:'Crypto',margin:100,leverage:'1:1'}};
const CORR={Brent:{Brent:-1,'Nat Gas':3,Gold:1,Silver:1,Copper:2,'S&P 500':0,'Nasdaq 100':0,'FTSE 100':1,'DAX 40':1,'Nikkei 225':1,Bitcoin:1},'Nat Gas':{Brent:3,'Nat Gas':-1,Gold:1,Silver:1,Copper:1,'S&P 500':0,'Nasdaq 100':0,'FTSE 100':1,'DAX 40':1,'Nikkei 225':1,Bitcoin:1},Gold:{Brent:1,'Nat Gas':1,Gold:-1,Silver:3,Copper:2,'S&P 500':0,'Nasdaq 100':0,'FTSE 100':1,'DAX 40':1,'Nikkei 225':1,Bitcoin:2},Silver:{Brent:1,'Nat Gas':1,Gold:3,Silver:-1,Copper:2,'S&P 500':0,'Nasdaq 100':0,'FTSE 100':1,'DAX 40':1,'Nikkei 225':1,Bitcoin:2},Copper:{Brent:2,'Nat Gas':1,Gold:2,Silver:2,Copper:-1,'S&P 500':2,'Nasdaq 100':2,'FTSE 100':2,'DAX 40':2,'Nikkei 225':2,Bitcoin:2},'S&P 500':{Brent:0,'Nat Gas':0,Gold:0,Silver:0,Copper:2,'S&P 500':-1,'Nasdaq 100':3,'FTSE 100':3,'DAX 40':3,'Nikkei 225':3,Bitcoin:2},'Nasdaq 100':{Brent:0,'Nat Gas':0,Gold:0,Silver:0,Copper:2,'S&P 500':3,'Nasdaq 100':-1,'FTSE 100':2,'DAX 40':3,'Nikkei 225':3,Bitcoin:3},'FTSE 100':{Brent:1,'Nat Gas':1,Gold:1,Silver:1,Copper:2,'S&P 500':3,'Nasdaq 100':2,'FTSE 100':-1,'DAX 40':3,'Nikkei 225':2,Bitcoin:1},'DAX 40':{Brent:1,'Nat Gas':1,Gold:1,Silver:1,Copper:2,'S&P 500':3,'Nasdaq 100':3,'FTSE 100':3,'DAX 40':-1,'Nikkei 225':3,Bitcoin:1},'Nikkei 225':{Brent:1,'Nat Gas':1,Gold:1,Silver:1,Copper:2,'S&P 500':3,'Nasdaq 100':3,'FTSE 100':2,'DAX 40':3,'Nikkei 225':-1,Bitcoin:2},Bitcoin:{Brent:1,'Nat Gas':1,Gold:2,Silver:2,Copper:2,'S&P 500':2,'Nasdaq 100':3,'FTSE 100':1,'DAX 40':1,'Nikkei 225':2,Bitcoin:-1}};
function corrClass(v){return v===-1?'corr-self':v===3?'corr-high':v===2?'corr-med':v===0?'corr-neg':'corr-low'}function corrLabel(v){return v===-1?'—':v===3?'HIGH':v===2?'MED':v===0?'NEG':'LOW'}function getMargin(i){return MARGIN_MAP[i]||{class:'—',margin:5,leverage:'1:20'}}

let trades=JSON.parse(localStorage.getItem('velox_trades')||'[]'),watchlist=JSON.parse(localStorage.getItem('velox_watchlist')||'{}'),currentTab='dashboard',editingId=null,fileSha=null;
INSTRUMENTS.forEach(i=>{if(!watchlist[i])watchlist[i]={status:'NOT IN PLAY',note:''}});
function getCashflows(){return JSON.parse(localStorage.getItem('velox_cashflows')||'[]')}function saveCashflows(cf){localStorage.setItem('velox_cashflows',JSON.stringify(cf))}
function addCashflow(type,amount,date){const cf=getCashflows();cf.push({type,amount,date:date||new Date().toISOString().slice(0,10),id:genId()});saveCashflows(cf)}
function removeCashflow(id){const cf=getCashflows().filter(c=>c.id!==id);saveCashflows(cf)}
function getTotalDeposited(){return getCashflows().reduce((s,c)=>s+(c.type==='deposit'?c.amount:-c.amount),0)}
function getEquity(){const deposited=getTotalDeposited();const realizedPnL=closedTrades().reduce((s,t)=>s+(t.pnl||0),0);return deposited+realizedPnL}
function getEquityHistory(){return JSON.parse(localStorage.getItem('velox_equity_history')||'[]')}
function addEquitySnapshot(eq,date){const h=getEquityHistory();h.push({equity:eq,deposited:getTotalDeposited(),date:date||new Date().toISOString().slice(0,10)});localStorage.setItem('velox_equity_history',JSON.stringify(h))}
function save(){localStorage.setItem('velox_trades',JSON.stringify(trades));localStorage.setItem('velox_watchlist',JSON.stringify(watchlist));syncToGitHub()}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}function openTrades(){return trades.filter(t=>t.status==='open')}function closedTrades(){return trades.filter(t=>t.status!=='open')}function calcRisk(t){return(!t.entry||!t.stop||!t.stake)?0:Math.abs(t.entry-t.stop)*t.stake}function calcRR(t){if(!t.entry||!t.stop||!t.target)return 0;const r=Math.abs(t.entry-t.stop);return r===0?0:Math.abs(t.target-t.entry)/r}function totalScore(t){return(t.scores||[0,0,0,0,0]).reduce((a,b)=>a+b,0)}function sizeRule(s){return s>=8?'FULL':s>=6?'HALF':'NO TRADE'}function fmt(n,d=2){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('en-GB',{minimumFractionDigits:d,maximumFractionDigits:d})}function fmtGBP(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'')+'\u00A3'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}

function getGHConfig(){return JSON.parse(localStorage.getItem('velox_gh_config')||'{}')}function saveGHConfig(c){localStorage.setItem('velox_gh_config',JSON.stringify(c))}function setSyncStatus(m,c){const e=document.getElementById('syncStatus');if(e){e.textContent=m;e.style.color=c||'var(--text2)'}}
async function syncToGitHub(){const c=getGHConfig();if(!c.token||!c.owner||!c.repo)return;setSyncStatus('Pushing...','var(--amber)');try{const p={trades,watchlist,cashflows:getCashflows(),equityHistory:getEquityHistory()};const ct=btoa(unescape(encodeURIComponent(JSON.stringify(p,null,2))));const b={message:`journal update ${new Date().toISOString().slice(0,16)}`,content:ct};if(fileSha)b.sha=fileSha;const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data/trades.json`,{method:'PUT',headers:{Authorization:`token ${c.token}`,'Content-Type':'application/json'},body:JSON.stringify(b)});if(r.ok){const d=await r.json();fileSha=d.content.sha;setSyncStatus('✓ '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),'var(--green)')}else setSyncStatus('✗ Push failed','var(--red)')}catch(e){setSyncStatus('✗ Error','var(--red)')}}
async function syncFromGitHub(){const c=getGHConfig();if(!c.token||!c.owner||!c.repo){setSyncStatus('Configure in ⚙','var(--amber)');return}setSyncStatus('Pulling...','var(--amber)');try{const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data/trades.json`,{headers:{Authorization:`token ${c.token}`}});if(r.ok){const d=await r.json();fileSha=d.sha;const rm=JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));if(Array.isArray(rm))trades=rm;else{trades=rm.trades||[];if(rm.cashflows)saveCashflows(rm.cashflows);if(rm.equity!=null)localStorage.setItem('velox_equity_legacy',rm.equity);if(rm.equityHistory)localStorage.setItem('velox_equity_history',JSON.stringify(rm.equityHistory));if(rm.watchlist){watchlist=rm.watchlist;INSTRUMENTS.forEach(i=>{if(!watchlist[i])watchlist[i]={status:'NOT IN PLAY',note:''}})}}localStorage.setItem('velox_trades',JSON.stringify(trades));localStorage.setItem('velox_watchlist',JSON.stringify(watchlist));setSyncStatus('✓ '+trades.length+' trades','var(--green)');render()}else if(r.status===404){fileSha=null;setSyncStatus('No remote data','var(--text2)')}else setSyncStatus('✗ Failed','var(--red)')}catch(e){setSyncStatus('✗ Error','var(--red)')}}

document.getElementById('tabs').addEventListener('click',e=>{if(e.target.classList.contains('tab')){currentTab=e.target.dataset.tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');render()}});
function render(){const c=document.getElementById('content');switch(currentTab){case'dashboard':c.innerHTML=renderDashboard();break;case'watchlist':c.innerHTML=renderWatchlist();break;case'new':c.innerHTML=renderNewTrade();bindForm();break;case'open':c.innerHTML=renderOpen();break;case'journal':c.innerHTML=renderJournal();break;case'stats':c.innerHTML=renderStats();break;case'settings':c.innerHTML=renderSettings();break}}

function renderDashboard(){const open=openTrades(),closed=closedTrades(),wins=closed.filter(t=>t.status==='win'),winRate=closed.length>0?wins.length/closed.length*100:0,totalPnL=closed.reduce((s,t)=>s+(t.pnl||0),0),openRisk=open.reduce((s,t)=>s+calcRisk(t),0),equity=getEquity(),riskPct=equity>0?openRisk/equity*100:0,dep=getTotalDeposited(),retPct=dep>0?(totalPnL/dep*100):0;
return`<div class="dashboard-grid"><div>
<div class="stats-row"><div class="stat-card"><div class="label">Open</div><div class="value">${open.length}</div></div><div class="stat-card"><div class="label">Closed</div><div class="value">${closed.length}</div></div><div class="stat-card"><div class="label">Win Rate</div><div class="value ${winRate>=50?'green':winRate>0?'red':''}">${fmt(winRate,1)}%</div></div><div class="stat-card"><div class="label">P&L</div><div class="value ${totalPnL>=0?'green':'red'}">${fmtGBP(totalPnL)}</div></div><div class="stat-card"><div class="label">Return</div><div class="value ${retPct>=0?'green':'red'}">${dep>0?(retPct>=0?'+':'')+fmt(retPct,1)+'%':'—'}</div></div><div class="stat-card"><div class="label">Risk/Eq</div><div class="value ${riskPct>10?'red':riskPct>5?'amber':'green'}">${equity>0?fmt(riskPct,1)+'%':'—'}</div></div></div>
<div class="section-header"><h3>Pipeline</h3></div>
<div class="wl-grid"><div class="wl-row wl-header"><div>Instrument</div><div>Status</div><div>Thesis / Trigger</div><div>Pos</div></div>
${INSTRUMENTS.map(i=>{const w=watchlist[i],sc=STATUS_CSS[w.status],cnt=open.filter(t=>t.instrument===i).length;return`<div class="wl-row"><div class="wl-inst">${i}</div><div class="wl-status"><span class="status-dot status-${sc}"></span>${w.status==='NOT IN PLAY'?'NIP':w.status==='TAKING PROFIT'?'TP':w.status}</div><div class="wl-note" title="${(w.note||'').replace(/"/g,'&quot;')}">${w.note||'—'}</div><div>${cnt>0?`<span style="color:var(--green);font-weight:600">${cnt}</span>`:'—'}</div></div>`}).join('')}</div>
<div class="section-header" style="margin-top:16px"><h3>Open Positions</h3></div>
${open.length===0?'<div class="empty"><p>No open positions</p></div>':`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Instrument</th><th>Dir</th><th>Entry</th><th>Stop</th><th>Target</th><th>£/pt</th><th>£ Risk</th><th>R:R</th><th>Score</th><th></th></tr></thead><tbody>${open.map(t=>`<tr><td>${t.date||'—'}</td><td style="font-weight:600;color:#fff">${t.instrument}</td><td><span class="tag tag-${t.direction}">${t.direction.toUpperCase()}</span></td><td>${fmt(t.entry,t.decimals||2)}</td><td>${fmt(t.stop,t.decimals||2)}</td><td>${fmt(t.target,t.decimals||2)}</td><td>£${fmt(t.stake)}</td><td style="color:var(--amber)">£${fmt(calcRisk(t))}</td><td>${fmt(calcRR(t),1)}:1</td><td><span class="score ${totalScore(t)>=8?'score-high':totalScore(t)>=6?'score-med':'score-low'}">${totalScore(t)}/10</span></td><td><button class="btn-sm btn-secondary" onclick="editTrade('${t.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div>`}
</div>${renderSidebar()}</div>`}

function renderSidebar(){const equity=getEquity(),open=openTrades(),totalRisk=open.reduce((s,t)=>s+calcRisk(t),0),riskPct=equity>0?totalRisk/equity*100:0;
const byInst={};open.forEach(t=>{const r=calcRisk(t);if(!byInst[t.instrument])byInst[t.instrument]={risk:0,count:0,direction:t.direction};byInst[t.instrument].risk+=r;byInst[t.instrument].count++});
const warnings=[];const live=Object.keys(byInst);for(let i=0;i<live.length;i++)for(let j=i+1;j<live.length;j++){const a=live[i],b=live[j],c=CORR[a]?.[b];if(c===3){const combined=byInst[a].risk+byInst[b].risk,pct=equity>0?combined/equity*100:0;warnings.push(pct>4?`${INST_SHORT[a]}+${INST_SHORT[b]}: £${fmt(combined)} (${fmt(pct,1)}%) exceeds 4%`:`${INST_SHORT[a]}+${INST_SHORT[b]}: HIGH corr`)}}
const hist=getEquityHistory();
return`<div class="sidebar">
<div class="sidebar-card"><h4>Account</h4>
<div style="display:flex;gap:6px;margin-bottom:8px"><input type="number" id="cfAmt" placeholder="Amount" step="any" style="width:90px;font-size:11px"><select id="cfType" style="font-size:11px;padding:5px"><option value="deposit">Deposit</option><option value="withdrawal">Withdrawal</option></select><button class="btn-sm btn-primary" onclick="addCF()">Add</button></div>
${(()=>{const dep=getTotalDeposited();const pnl=closedTrades().reduce((s,t)=>s+(t.pnl||0),0);const eq=dep+pnl;const retPct=dep>0?(pnl/dep*100):0;const cf=getCashflows();
return`<div style="font-size:18px;font-weight:700;color:#fff">£${fmt(eq)}</div>
<div style="margin-top:6px;font-size:11px;color:var(--text2)">Deposited: £${fmt(dep)}</div>
<div style="font-size:11px;color:var(--text2)">Realised P&L: <span style="color:${pnl>=0?'var(--green)':'var(--red)'};font-weight:600">${fmtGBP(pnl)}</span></div>
<div style="font-size:13px;font-weight:700;margin-top:4px;color:${retPct>=0?'var(--green)':'var(--red)'}">${retPct>=0?'+':''}${fmt(retPct,2)}% return</div>
<div style="margin-top:8px;font-size:11px;color:var(--text2)">Risk: <span style="color:var(--amber);font-weight:600">£${fmt(totalRisk)}</span>${eq>0?` <span class="risk-pct">(${fmt(totalRisk/eq*100,1)}%)</span>`:''}</div>
${eq>0?`<div style="margin-top:4px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min(totalRisk/eq*100,100)}%;background:${totalRisk/eq*100>10?'var(--red)':totalRisk/eq*100>5?'var(--amber)':'var(--green)'};border-radius:2px"></div></div>`:''}
${cf.length>0?`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px"><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">HISTORY</div>${cf.slice(-5).reverse().map(c=>`<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;color:var(--text2)"><span>${c.date.slice(5)} ${c.type==='deposit'?'↑':'↓'}</span><span style="color:${c.type==='deposit'?'var(--green)':'var(--red)'}">£${fmt(c.amount)}</span><span style="cursor:pointer;color:var(--text2)" onclick="removeCF('${c.id}')">✕</span></div>`).join('')}</div>`:''}`})()}</div>
<div class="sidebar-card"><h4>Risk by Instrument</h4>${Object.keys(byInst).length===0?'<div style="font-size:11px;color:var(--text2)">No positions</div>':Object.entries(byInst).sort((a,b)=>b[1].risk-a[1].risk).map(([i,d])=>`<div class="risk-row"><div><span style="color:#fff;font-weight:500">${INST_SHORT[i]||i}</span><span style="font-size:9px;color:${d.direction==='long'?'var(--green)':'var(--red)'};margin-left:4px">${d.direction.toUpperCase()}</span>${d.count>1?`<span style="font-size:9px;color:var(--text2)"> ×${d.count}</span>`:''}</div><div><span style="color:var(--amber);font-weight:600">£${fmt(d.risk)}</span>${equity>0?`<span class="risk-pct">${fmt(d.risk/equity*100,1)}%</span>`:''}</div></div>`).join('')}${Object.keys(byInst).length>0?`<div class="risk-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-weight:600"><span style="color:#fff">TOTAL</span><div><span style="color:var(--amber)">£${fmt(totalRisk)}</span>${equity>0?`<span class="risk-pct">${fmt(riskPct,1)}%</span>`:''}</div></div>`:''}</div>
${warnings.length>0?`<div class="sidebar-card" style="border-color:var(--red)"><h4 style="color:var(--red)">⚠ Correlation</h4>${warnings.map(w=>`<div style="font-size:10px;color:var(--red);margin-bottom:4px">${w}</div>`).join('')}</div>`:''}
${hist.length>=2?`<div class="sidebar-card"><h4>Equity Curve</h4>${renderMiniCurve(hist)}</div>`:`<div class="sidebar-card"><h4>Equity Curve</h4><div style="font-size:11px;color:var(--text2)">Take snapshots to build</div><button class="btn-sm btn-secondary" style="margin-top:8px" onclick="snapshotEq()">📸 Snapshot</button></div>`}
</div>`}
function addCF(){const amt=parseFloat(document.getElementById('cfAmt')?.value);const type=document.getElementById('cfType')?.value;if(!amt||amt<=0){alert('Enter a valid amount');return}addCashflow(type,amt);save();render()}
function removeCF(id){if(confirm('Remove this entry?')){removeCashflow(id);save();render()}}
function snapshotEq(){const eq=getEquity();if(eq<=0){alert('Add a deposit first');return}addEquitySnapshot(eq);save();render()}
function renderMiniCurve(h){const v=h.map(x=>x.equity),mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1,w=240,ht=80,st=w/(v.length-1);let p='';v.forEach((val,i)=>{const x=i*st,y=ht-((val-mn)/rng*(ht-10))-5;p+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)});const l=v[v.length-1],f=v[0],c=l>=f?'var(--green)':'var(--red)';return`<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:${ht}px"><path d="${p}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${(v.length-1)*st}" cy="${ht-((l-mn)/rng*(ht-10))-5}" r="3" fill="${c}"/></svg><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px"><span>${h[0].date}</span><span style="color:${c};font-weight:600">${l>=f?'+':''}£${fmt(Math.abs(l-f))}</span><span>${h[h.length-1].date}</span></div>`}

function renderWatchlist(){return`<div class="form-section"><h3>Instrument Watchlist & Pipeline</h3><p style="font-size:12px;color:var(--text2);margin-bottom:16px">Set status and thesis per instrument. Syncs to GitHub.</p>
<div class="wl-grid"><div class="wl-row wl-header"><div>Instrument</div><div>Status</div><div>Thesis / Trigger</div><div></div></div>
${INSTRUMENTS.map(i=>{const w=watchlist[i],k=i.replace(/\s/g,'_');return`<div class="wl-row" style="background:var(--bg2)"><div class="wl-inst">${i}</div><div><select id="wl_s_${k}" style="font-size:10px;padding:4px;width:100%">${STATUSES.map(s=>`<option ${w.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div style="padding:4px 10px"><input type="text" id="wl_n_${k}" value="${(w.note||'').replace(/"/g,'&quot;')}" placeholder="e.g. Waiting for 200 EMA reclaim..." style="width:100%;font-size:11px;padding:5px 8px"></div><div></div></div>`}).join('')}</div>
<div class="form-actions"><button class="btn-primary" onclick="saveWL()">Save Watchlist</button></div></div>
<div class="form-section"><h3>Correlation Matrix</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">HIGH = shared risk cap (4%). NEG = hedge benefit.</p><div class="table-wrap"><table class="corr-table"><thead><tr><th></th>${INSTRUMENTS.map(i=>`<th>${INST_SHORT[i]}</th>`).join('')}</tr></thead><tbody>${INSTRUMENTS.map(a=>`<tr><th>${INST_SHORT[a]}</th>${INSTRUMENTS.map(b=>{const v=CORR[a][b];return`<td class="${corrClass(v)}">${corrLabel(v)}</td>`}).join('')}</tr>`).join('')}</tbody></table></div></div>`}
function saveWL(){INSTRUMENTS.forEach(i=>{const k=i.replace(/\s/g,'_');watchlist[i]={status:document.getElementById('wl_s_'+k).value,note:document.getElementById('wl_n_'+k).value}});save();render()}

function renderNewTrade(){const t=editingId?trades.find(x=>x.id===editingId):null;return`<div class="form-section"><h3>${t?'Edit Trade':'New Trade'}</h3><div class="form-grid">
<div class="form-group"><label>Instrument</label><select id="f_inst" onchange="updateMargin();updateCalcs()">${INSTRUMENTS.map(i=>`<option ${t&&t.instrument===i?'selected':''}>${i}</option>`).join('')}</select></div>
<div class="form-group"><label>Class / Margin</label><div id="marginInfo" style="padding:7px 0;font-size:12px;color:var(--text2)">—</div></div>
<div class="form-group"><label>Direction</label><select id="f_dir"><option value="long" ${t&&t.direction==='long'?'selected':''}>Long</option><option value="short" ${t&&t.direction==='short'?'selected':''}>Short</option></select></div>
<div class="form-group"><label>Date</label><input type="date" id="f_date" value="${t?t.date:new Date().toISOString().slice(0,10)}"></div>
<div class="form-group"><label>Timeframe</label><select id="f_tf">${TIMEFRAMES.map(tf=>`<option ${t&&t.timeframe===tf?'selected':''}>${tf}</option>`).join('')}</select></div>
<div class="form-group"><label>Entry</label><input type="number" step="any" id="f_entry" value="${t?t.entry:''}" oninput="updateCalcs()"></div>
<div class="form-group"><label>Stop Loss</label><input type="number" step="any" id="f_stop" value="${t?t.stop:''}" oninput="updateCalcs()"></div>
<div class="form-group"><label>Target</label><input type="number" step="any" id="f_target" value="${t?t.target:''}" oninput="updateCalcs()"></div>
<div class="form-group"><label>£ per Point</label><input type="number" step="any" id="f_stake" value="${t?t.stake:''}" oninput="updateCalcs()"></div></div>
<div class="calc-row"><div class="calc-item"><div class="label">STOP DIST</div><div class="val" id="c_dist">—</div></div><div class="calc-item"><div class="label">£ AT RISK</div><div class="val" id="c_risk" style="color:var(--amber)">—</div></div><div class="calc-item"><div class="label">R:R</div><div class="val" id="c_rr">—</div></div><div class="calc-item"><div class="label">£ REWARD</div><div class="val" id="c_reward" style="color:var(--green)">—</div></div><div class="calc-item"><div class="label">MARGIN</div><div class="val" id="c_margin" style="color:var(--blue)">—</div></div></div>
<div style="margin-top:20px"><label style="font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:8px">SETUP SCORE</label><div class="score-grid">${CRITERIA.map((c,i)=>`<div class="score-item"><label>${c}</label><select id="f_sc_${i}" onchange="updateScore()">${[0,1,2].map(v=>`<option value="${v}" ${t&&t.scores&&t.scores[i]===v?'selected':''}>${v}</option>`).join('')}</select></div>`).join('')}</div><div style="margin-top:10px;display:flex;gap:16px;align-items:center"><span style="font-size:11px;color:var(--text2)">TOTAL:</span><span id="scoreTotal" style="font-size:20px;font-weight:700;color:#fff">0/10</span><span id="sizeRule" class="tag" style="font-size:11px">—</span></div></div>
<div class="form-grid" style="margin-top:16px"><div class="form-group form-full"><label>Thesis / Notes</label><textarea id="f_notes" rows="3">${t?t.notes||'':''}</textarea></div><div class="form-group"><label>Screenshot URL</label><input type="url" id="f_ss" value="${t?t.screenshot||'':''}" placeholder="https://..."></div>
${t?`<div class="form-group"><label>Status</label><select id="f_status"><option value="open" ${t.status==='open'?'selected':''}>Open</option><option value="win" ${t.status==='win'?'selected':''}>Win</option><option value="loss" ${t.status==='loss'?'selected':''}>Loss</option><option value="breakeven" ${t.status==='breakeven'?'selected':''}>BE</option></select></div><div class="form-group"><label>Close Price</label><input type="number" step="any" id="f_close" value="${t.closePrice||''}"></div><div class="form-group"><label>P&L (£)</label><input type="number" step="any" id="f_pnl" value="${t.pnl||''}"></div>`:''}</div>
<div class="form-actions"><button class="btn-primary" onclick="saveTrade()">${t?'Update':'Log Trade'}</button>${t?`<button class="btn-danger" onclick="deleteTrade('${t.id}')">Delete</button>`:''}<button class="btn-secondary" onclick="editingId=null;currentTab='dashboard';render()">Cancel</button></div></div>`}
function bindForm(){updateCalcs();updateScore();updateMargin()}
function updateMargin(){const i=document.getElementById('f_inst')?.value,m=getMargin(i),e=document.getElementById('marginInfo');if(e)e.innerHTML=`<span style="color:#fff;font-weight:600">${m.class}</span> · ${m.margin}% · ${m.leverage}`}
function updateCalcs(){const en=parseFloat(document.getElementById('f_entry')?.value),st=parseFloat(document.getElementById('f_stop')?.value),tg=parseFloat(document.getElementById('f_target')?.value),sk=parseFloat(document.getElementById('f_stake')?.value),inst=document.getElementById('f_inst')?.value;const dist=(!isNaN(en)&&!isNaN(st))?Math.abs(en-st):null,risk=(dist&&!isNaN(sk))?dist*sk:null,rr=(dist&&!isNaN(tg)&&!isNaN(en)&&dist>0)?Math.abs(tg-en)/dist:null,reward=(rr&&risk)?rr*risk:null,m=getMargin(inst),margin=(!isNaN(en)&&!isNaN(sk))?en*sk*(m.margin/100):null;const el=id=>document.getElementById(id);if(el('c_dist'))el('c_dist').textContent=dist!=null?fmt(dist,2)+' pts':'—';if(el('c_risk'))el('c_risk').textContent=risk!=null?'£'+fmt(risk):'—';if(el('c_rr'))el('c_rr').textContent=rr!=null?fmt(rr,1)+':1':'—';if(el('c_reward'))el('c_reward').textContent=reward!=null?'£'+fmt(reward):'—';if(el('c_margin'))el('c_margin').textContent=margin!=null?'£'+fmt(margin):'—'}
function updateScore(){let total=0;for(let i=0;i<5;i++){const e=document.getElementById(`f_sc_${i}`);if(e)total+=parseInt(e.value)}const e=document.getElementById('scoreTotal'),r=document.getElementById('sizeRule');if(e){e.textContent=total+'/10';e.style.color=total>=8?'var(--green)':total>=6?'var(--amber)':'var(--red)'}if(r){const s=sizeRule(total);r.textContent=s;r.style.background=s==='FULL'?'rgba(46,204,113,.15)':s==='HALF'?'rgba(243,156,18,.15)':'rgba(231,76,60,.15)';r.style.color=s==='FULL'?'var(--green)':s==='HALF'?'var(--amber)':'var(--red)'}}
function saveTrade(){const scores=[];for(let i=0;i<5;i++)scores.push(parseInt(document.getElementById(`f_sc_${i}`).value));const inst=document.getElementById('f_inst').value,mi=getMargin(inst);const data={id:editingId||genId(),instrument:inst,assetClass:mi.class,marginPct:mi.margin,leverage:mi.leverage,direction:document.getElementById('f_dir').value,date:document.getElementById('f_date').value,timeframe:document.getElementById('f_tf').value,entry:parseFloat(document.getElementById('f_entry').value)||null,stop:parseFloat(document.getElementById('f_stop').value)||null,target:parseFloat(document.getElementById('f_target').value)||null,stake:parseFloat(document.getElementById('f_stake').value)||null,scores,notes:document.getElementById('f_notes').value,screenshot:document.getElementById('f_ss').value,status:document.getElementById('f_status')?.value||'open',closePrice:parseFloat(document.getElementById('f_close')?.value)||null,pnl:parseFloat(document.getElementById('f_pnl')?.value)||null,decimals:['Silver','Copper'].includes(inst)?4:3};if(data.status!=='open'&&data.pnl!=null){const r=calcRisk(data);data.actualRR=r>0?data.pnl/r:0}if(editingId){const idx=trades.findIndex(t=>t.id===editingId);if(idx>=0)trades[idx]=data}else trades.push(data);save();editingId=null;currentTab='dashboard';render()}
function editTrade(id){editingId=id;currentTab='new';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector('[data-tab="new"]').classList.add('active');render()}
function deleteTrade(id){if(confirm('Delete?')){trades=trades.filter(t=>t.id!==id);save();editingId=null;currentTab='dashboard';render()}}

function renderOpen(){const open=openTrades();if(open.length===0)return'<div class="empty"><p>No open positions</p></div>';return`<div class="section-header"><h3>Open Positions</h3></div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Instrument</th><th>Dir</th><th>Entry</th><th>Stop</th><th>Target</th><th>£/pt</th><th>£ Risk</th><th>R:R</th><th>Score</th><th>TF</th><th>Notes</th><th></th></tr></thead><tbody>${open.map(t=>`<tr><td>${t.date||'—'}</td><td style="font-weight:600;color:#fff">${t.instrument}</td><td><span class="tag tag-${t.direction}">${t.direction.toUpperCase()}</span></td><td>${fmt(t.entry,t.decimals||2)}</td><td>${fmt(t.stop,t.decimals||2)}</td><td>${fmt(t.target,t.decimals||2)}</td><td>£${fmt(t.stake)}</td><td style="color:var(--amber)">£${fmt(calcRisk(t))}</td><td>${fmt(calcRR(t),1)}:1</td><td><span class="score ${totalScore(t)>=8?'score-high':totalScore(t)>=6?'score-med':'score-low'}">${totalScore(t)}/10</span></td><td>${t.timeframe||'—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--text2)">${t.notes||'—'}</td><td><button class="btn-sm btn-secondary" onclick="editTrade('${t.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div>`}

function renderJournal(){const closed=closedTrades().reverse();if(closed.length===0)return'<div class="empty"><p>No closed trades</p></div>';return`<div class="section-header"><h3>Trade Journal</h3></div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Instrument</th><th>Dir</th><th>Entry</th><th>Close</th><th>Result</th><th>P&L</th><th>R</th><th>Score</th><th>Notes</th><th></th></tr></thead><tbody>${closed.map(t=>`<tr><td>${t.date||'—'}</td><td style="font-weight:600;color:#fff">${t.instrument}</td><td><span class="tag tag-${t.direction}">${t.direction.toUpperCase()}</span></td><td>${fmt(t.entry,t.decimals||2)}</td><td>${fmt(t.closePrice,t.decimals||2)}</td><td><span class="tag tag-${t.status}">${t.status.toUpperCase()}</span></td><td style="color:${(t.pnl||0)>=0?'var(--green)':'var(--red)'}">${fmtGBP(t.pnl||0)}</td><td>${fmt(t.actualRR||0,2)}R</td><td><span class="score ${totalScore(t)>=8?'score-high':totalScore(t)>=6?'score-med':'score-low'}">${totalScore(t)}/10</span></td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--text2)">${t.notes||'—'}</td><td><button class="btn-sm btn-secondary" onclick="editTrade('${t.id}')">Edit</button></td></tr>`).join('')}</tbody></table></div>`}

function renderStats(){const closed=closedTrades();if(closed.length<2)return'<div class="empty"><p>Need 2+ closed trades</p></div>';const wins=closed.filter(t=>t.status==='win'),losses=closed.filter(t=>t.status==='loss'),winRate=wins.length/closed.length*100,totalPnL=closed.reduce((s,t)=>s+(t.pnl||0),0),avgWin=wins.length>0?wins.reduce((s,t)=>s+(t.pnl||0),0)/wins.length:0,avgLoss=losses.length>0?losses.reduce((s,t)=>s+(t.pnl||0),0)/losses.length:0,expectancy=totalPnL/closed.length,avgR=closed.reduce((s,t)=>s+(t.actualRR||0),0)/closed.length;const byInst={};closed.forEach(t=>{if(!byInst[t.instrument])byInst[t.instrument]={pnl:0,count:0,wins:0};byInst[t.instrument].pnl+=(t.pnl||0);byInst[t.instrument].count++;if(t.status==='win')byInst[t.instrument].wins++});const maxP=Math.max(...Object.values(byInst).map(v=>Math.abs(v.pnl)),1);const hist=getEquityHistory();
return`<div class="stats-row"><div class="stat-card"><div class="label">Win Rate</div><div class="value ${winRate>=50?'green':'red'}">${fmt(winRate,1)}%</div></div><div class="stat-card"><div class="label">P&L</div><div class="value ${totalPnL>=0?'green':'red'}">${fmtGBP(totalPnL)}</div></div><div class="stat-card"><div class="label">Expectancy</div><div class="value ${expectancy>=0?'green':'red'}">${fmtGBP(expectancy)}</div></div><div class="stat-card"><div class="label">Avg Win</div><div class="value green">${fmtGBP(avgWin)}</div></div><div class="stat-card"><div class="label">Avg Loss</div><div class="value red">${fmtGBP(avgLoss)}</div></div><div class="stat-card"><div class="label">Avg R</div><div class="value">${fmt(avgR,2)}R</div></div></div>
<div class="chart-grid"><div class="chart-card"><h4>P&L by Instrument</h4>${Object.entries(byInst).sort((a,b)=>b[1].pnl-a[1].pnl).map(([i,d])=>`<div class="bar-row"><div class="bar-label">${INST_SHORT[i]||i}</div><div class="bar-track"><div class="bar-fill ${d.pnl>=0?'green':'red'}" style="width:${Math.max(Math.abs(d.pnl)/maxP*100,8)}%">${fmtGBP(d.pnl)}</div></div></div>`).join('')}</div>
<div class="chart-card"><h4>Win Rate by Instrument</h4>${Object.entries(byInst).sort((a,b)=>(b[1].wins/b[1].count)-(a[1].wins/a[1].count)).map(([i,d])=>{const wr=d.count>0?d.wins/d.count*100:0;return`<div class="bar-row"><div class="bar-label">${INST_SHORT[i]||i}</div><div class="bar-track"><div class="bar-fill ${wr>=50?'green':'red'}" style="width:${Math.max(wr,8)}%">${fmt(wr,0)}% (${d.count})</div></div></div>`}).join('')}</div></div>
<div class="chart-card" style="margin-top:16px"><h4>Cumulative P&L</h4><div style="display:flex;align-items:flex-end;gap:2px;height:120px;padding-top:10px">${(()=>{let cum=0;const pts=closed.map(t=>{cum+=(t.pnl||0);return cum});const mx=Math.max(...pts.map(Math.abs),1);return pts.map(p=>`<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center"><div style="width:100%;max-width:20px;height:${Math.max(Math.abs(p)/mx*100,3)}%;background:${p>=0?'var(--green)':'var(--red)'};border-radius:2px 2px 0 0"></div></div>`).join('')})()}</div></div>
${hist.length>=2?`<div class="chart-card" style="margin-top:16px"><h4>Equity Curve</h4>${renderFullCurve(hist)}</div>`:''}`}
function renderFullCurve(h){const v=h.map(x=>x.equity),dates=h.map(x=>x.date),mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1,cw=700,ch=180,pL=55,pR=10,pT=10,pB=25,pw=cw-pL-pR,ph=ch-pT-pB,stp=pw/(v.length-1);let lp='',ap='';v.forEach((val,i)=>{const x=pL+i*stp,y=pT+ph-((val-mn)/rng*ph);lp+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);if(i===0)ap='M'+x.toFixed(1)+','+(pT+ph);ap+='L'+x.toFixed(1)+','+y.toFixed(1)});ap+='L'+(pL+(v.length-1)*stp).toFixed(1)+','+(pT+ph)+'Z';const l=v[v.length-1],f=v[0],c=l>=f?'var(--green)':'var(--red)';let yL='';for(let i=0;i<=4;i++){const val=mn+(rng*i/4),y=pT+ph-(i/4*ph);yL+=`<text x="${pL-4}" y="${y+4}" fill="var(--text2)" font-size="9" text-anchor="end">£${Math.round(val).toLocaleString()}</text><line x1="${pL}" y1="${y}" x2="${cw-pR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`}let xL='';const li=Math.max(1,Math.floor(v.length/5));dates.forEach((d,i)=>{if(i%li===0||i===dates.length-1)xL+=`<text x="${pL+i*stp}" y="${ch-4}" fill="var(--text2)" font-size="8" text-anchor="middle">${d.slice(5)}</text>`});return`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text2)">£${fmt(f)}</span><span style="font-size:14px;font-weight:700;color:${c}">${l>=f?'+':''}${fmt((l-f)/f*100,1)}%</span><span style="font-size:12px;color:var(--text2)">£${fmt(l)}</span></div><svg viewBox="0 0 ${cw} ${ch}" style="width:100%;height:${ch}px">${yL}${xL}<defs><linearGradient id="eqG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity="0.3"/><stop offset="100%" stop-color="${c}" stop-opacity="0.02"/></linearGradient></defs><path d="${ap}" fill="url(#eqG)"/><path d="${lp}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${pL+(v.length-1)*stp}" cy="${pT+ph-((l-mn)/rng*ph)}" r="4" fill="${c}"/></svg>`}

function renderSettings(){const cfg=getGHConfig();return`<div class="form-section"><h3>GitHub Sync</h3><p style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">Data stored as <code style="color:var(--accent)">data/trades.json</code>. Auto-pushes on save.</p><div class="form-grid"><div class="form-group"><label>Username</label><input type="text" id="gh_owner" value="${cfg.owner||''}" placeholder="username"></div><div class="form-group"><label>Repository</label><input type="text" id="gh_repo" value="${cfg.repo||''}" placeholder="trade-journal"></div><div class="form-group form-full"><label>Token</label><input type="password" id="gh_token" value="${cfg.token||''}" placeholder="github_pat_..."></div></div><p style="font-size:11px;color:var(--text2);margin-top:12px"><a href="https://github.com/settings/tokens" target="_blank" style="color:var(--accent)">Create token</a> → Fine-grained → repo → Contents: Read and write</p><div class="form-actions" style="margin-top:16px"><button class="btn-primary" onclick="saveSett()">Save</button><button class="btn-secondary" onclick="testGH()">Test</button></div><div id="settingsMsg" style="margin-top:12px;font-size:12px"></div></div>`}
function saveSett(){saveGHConfig({owner:document.getElementById('gh_owner').value.trim(),repo:document.getElementById('gh_repo').value.trim(),token:document.getElementById('gh_token').value.trim()});const e=document.getElementById('settingsMsg');if(e){e.textContent='✓ Saved';e.style.color='var(--green)'}}
async function testGH(){saveSett();const c=getGHConfig(),e=document.getElementById('settingsMsg');if(!c.token||!c.owner||!c.repo){if(e){e.textContent='✗ Fill all fields';e.style.color='var(--red)'}return}if(e){e.textContent='Testing...';e.style.color='var(--amber)'}try{const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}`,{headers:{Authorization:`token ${c.token}`}});if(r.ok){const d=await r.json();if(e){e.innerHTML=`✓ <strong>${d.full_name}</strong>`;e.style.color='var(--green)'}}else if(e){e.textContent=`✗ ${r.status}`;e.style.color='var(--red)'}}catch(er){if(e){e.textContent='✗ Error';e.style.color='var(--red)'}}}
function exportData(){const b=new Blob([JSON.stringify({trades,watchlist,cashflows:getCashflows(),equityHistory:getEquityHistory()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`velox_${new Date().toISOString().slice(0,10)}.json`;a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(Array.isArray(d)){if(confirm(`Import ${d.length} trades?`)){trades=d;save();render()}}else if(d.trades){if(confirm(`Import ${d.trades.length} trades?`)){trades=d.trades;if(d.watchlist){watchlist=d.watchlist;INSTRUMENTS.forEach(i=>{if(!watchlist[i])watchlist[i]={status:'NOT IN PLAY',note:''}})}if(d.cashflows)saveCashflows(d.cashflows);if(d.equityHistory)localStorage.setItem('velox_equity_history',JSON.stringify(d.equityHistory));save();render()}}}catch(err){alert('Invalid JSON')}};r.readAsText(f);ev.target.value=''}
async function init(){render();const c=getGHConfig();if(c.token&&c.owner&&c.repo)await syncFromGitHub()}init();
</script>
</body>
