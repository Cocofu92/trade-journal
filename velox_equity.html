<style>
:root{--bg:#090b0d;--bg2:#0f1216;--bg3:#161b22;--border:#1e2530;--text:#b8c0cc;--text2:#5a6478;--white:#e8edf3;--green:#00c896;--red:#ff4757;--amber:#ffa502;--blue:#3b82f6;--mono:'JetBrains Mono',monospace;--serif:'DM Serif Display',serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;min-height:100vh}
::selection{background:var(--green);color:#000}
.app{max-width:1280px;margin:0 auto;padding:16px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.brand h1{font-family:var(--serif);font-size:24px;color:var(--white);letter-spacing:.5px}
.brand .sub{font-size:9px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.header-meta{font-size:10px;color:var(--text2);text-align:right}

/* Tabs */
.tabs{display:flex;gap:1px;margin-bottom:16px;background:var(--border);border-radius:6px;padding:1px;width:fit-content}
.tab{padding:8px 20px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--text2);font-weight:500;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg3);color:var(--white);font-weight:600}

/* Buttons */
.btn{padding:7px 16px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--text2);color:var(--white)}
.btn-green{background:rgba(0,200,150,.12);border-color:var(--green);color:var(--green);font-weight:600}
.btn-green:hover{background:rgba(0,200,150,.2)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-sm{padding:4px 10px;font-size:10px}

/* Progress */
.progress-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.prog-label{font-size:11px;color:var(--text);margin-bottom:8px}
.prog-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.prog-stats{display:flex;gap:24px;margin-top:10px}
.prog-stat{font-size:10px;color:var(--text2)}
.prog-stat span{color:var(--white);font-weight:600}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;padding:12px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.filter-bar label{font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.filter-bar input,.filter-bar select{padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--white);font-family:var(--mono);font-size:11px;width:auto}
.filter-bar input{width:70px}
.filter-group{display:flex;align-items:center;gap:6px}

/* Sub-tabs */
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{padding:5px 14px;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:10px;color:var(--text2)}
.sub-tab.active{border-color:var(--green);color:var(--green);background:rgba(0,200,150,.08)}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:9px 12px;background:var(--bg2);color:var(--text2);font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
td{padding:7px 12px;border-bottom:1px solid var(--border)}
tr:last-child td{border:none}
tr:hover td{background:var(--bg2)}
.ticker-cell{font-weight:700;color:var(--white)}
.name-cell{color:var(--text2);font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rs-hi{color:var(--green);font-weight:600}
.rs-mid{color:var(--amber)}
.rs-lo{color:var(--red)}
.setup-vcp{color:var(--blue);font-weight:600}
.setup-pb{color:var(--green);font-weight:600}
.setup-none{color:var(--text2)}
.trend-ok{color:var(--green)}
.trend-no{color:var(--red)}

/* Industry table */
.industry-grid{display:grid;gap:12px}
.industry-row{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.industry-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.industry-head:hover{background:var(--bg3)}
.industry-name{font-weight:600;color:var(--white)}
.industry-meta{display:flex;gap:16px;font-size:10px;color:var(--text2)}
.industry-body{display:none;padding:8px}
.industry-body.open{display:block}

/* Givens-style industry RS table */
.industry-table{width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums}
.industry-table thead th{background:var(--bg2);color:var(--text2);font-weight:600;padding:10px 8px;text-align:right;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.5px;font-size:10px;position:sticky;top:0;z-index:2}
.industry-table thead th:first-child{text-align:left}
.industry-table thead th.sortable:hover{background:var(--bg3);color:var(--white)}
.industry-table tbody td{padding:8px 8px;text-align:right;border-bottom:1px solid var(--border);color:var(--text)}
.industry-table tbody tr.industry-row-table:hover{background:var(--bg2)}
.industry-table tbody tr.industry-row-table{transition:background .15s}
.industry-table tbody tr.industry-drill td{padding:0;border-bottom:2px solid var(--border)}

/* Journal form */
.form-section{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.field label{display:block;font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--white);font-family:var(--mono);font-size:11px}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
.stat .lbl{font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.stat .val{font-size:18px;font-weight:700;color:var(--white);margin-top:4px}

/* Curve */
.curve{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.curve h4{font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}

.empty{text-align:center;padding:40px;color:var(--text2);font-size:11px}
.section-head{font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin:16px 0 10px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600}
.badge-green{background:rgba(0,200,150,.12);color:var(--green)}
.badge-red{background:rgba(255,71,87,.12);color:var(--red)}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.badge-grey{background:rgba(90,100,120,.15);color:var(--text2)}
</style>
</head>

<script>
const FMP_KEY='fsUwZ3RqDc7Wa2pjUyMhlLnOet1HVwUl';
const BATCH_SIZE=3;
const BATCH_MS=1000; // 3 calls/sec = 180/min, safe under 200/min limit

let currentTab='screener';
let scanRunning=false;
let scanAbort=false;
let screenerFilter={
  minRS:80,minIndRS:0,setup:'all',trendOnly:false,
  minPrice:2,maxPrice:0,minMcap:0,
  // CANSLIM defaults (William O'Neil's classic thresholds)
  minEpsGrowthQ:25,minEpsGrowthA:25,maxFromHigh:15,maxFloatM:0,minInstOwn:0,minDaysToEarnings:5,
  canslim:true, // ON by default
  // Stage 1→2 filters (null = off)
  stage12:false,
  max12m:null,    // e.g. 30 = only stocks with 12M return ≤ 30% (dead money)
  min1m:null,     // e.g. 5 = only stocks with 1M return ≥ 5% (emerging thrust)
  maxDaysBreakout:null, // e.g. 60 = only stocks that broke above 150-SMA within last 60 trading days
  maxRS:null,     // e.g. 85 = only stocks with RS ≤ 85 (not yet top decile = leader-in-waiting)
};
let screenerSubTab='setups';
let sortCol='rsScore';let sortDir='desc';
let industryExpanded={};
let industrySortCol='rsConfirmed';
let industrySortDir='desc';
function setIndustrySort(col){
  if(industrySortCol===col){industrySortDir=industrySortDir==='desc'?'asc':'desc'}
  else{industrySortCol=col;industrySortDir='desc'}
  render();
}

// Load cached data
let scanResults=[];let scanMeta={lastRun:null,total:0,processed:0,errors:0};

// ═══════════════════════════════════════════════════════════════════════════
// FINVIZ INDUSTRY OVERRIDE MAP
// One-time CSV import from Finviz gives us cleaner industry categorisation
// than FMP's API. Map persists in localStorage; processStock checks it first.
// ═══════════════════════════════════════════════════════════════════════════
let finvizMap=(()=>{
  try{
    const saved=localStorage.getItem('velox_eq_finviz_map');
    return saved?JSON.parse(saved):{};
  }catch(e){return{};}
})();
let finvizMeta=(()=>{
  try{
    const saved=localStorage.getItem('velox_eq_finviz_meta');
    return saved?JSON.parse(saved):{imported:null,count:0};
  }catch(e){return{imported:null,count:0};}
})();

// Parse a Finviz CSV export. Expected columns: Ticker, Sector, Industry (also handles No.,Company,Country,Market Cap).
// Returns {ticker: {sector, industry, country?, marketCap?}}.
function parseFinvizCSV(text){
  // Handle BOM + CRLF, split lines
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)throw new Error('CSV appears empty');
  // Simple CSV parser — Finviz exports are clean (no embedded commas in fields, no quote-escaping)
  // but we handle quoted fields just in case
  const parseLine=line=>{
    const out=[];let cur='';let inQuote=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQuote=!inQuote;continue}
      if(c===','&&!inQuote){out.push(cur);cur='';continue}
      cur+=c;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const header=parseLine(lines[0]).map(h=>h.toLowerCase());
  const tickerIdx=header.findIndex(h=>h==='ticker'||h==='symbol');
  const industryIdx=header.findIndex(h=>h==='industry');
  const sectorIdx=header.findIndex(h=>h==='sector');
  const countryIdx=header.findIndex(h=>h==='country');
  const marketCapIdx=header.findIndex(h=>h==='market cap'||h==='marketcap');
  if(tickerIdx<0)throw new Error('No "Ticker" or "Symbol" column found in header');
  if(industryIdx<0)throw new Error('No "Industry" column found in header');
  const map={};
  for(let i=1;i<lines.length;i++){
    const cols=parseLine(lines[i]);
    const ticker=(cols[tickerIdx]||'').toUpperCase().trim();
    const industry=(cols[industryIdx]||'').trim();
    if(!ticker||!industry)continue;
    map[ticker]={
      industry,
      sector:sectorIdx>=0?(cols[sectorIdx]||'').trim():'',
      country:countryIdx>=0?(cols[countryIdx]||'').trim():'',
      marketCap:marketCapIdx>=0?parseFloat(cols[marketCapIdx])||0:0,
    };
  }
  return map;
}

// Apply Finviz industry/sector overrides to existing scan results (no re-scan needed)
// and recompute industryStats aggregate.
function remapWithFinviz(){
  if(Object.keys(finvizMap).length===0){log('Finviz map is empty — nothing to remap','warn');return;}
  let remapped=0;
  scanResults.forEach(r=>{
    const fv=finvizMap[r.ticker];
    if(fv&&fv.industry){
      r.industry=fv.industry;
      if(fv.sector)r.sector=fv.sector;
      remapped++;
    }
  });
  log(`Remapped ${remapped} of ${scanResults.length} stocks with Finviz industries`,'ok');
  calcIndustryStats(scanResults);
  saveScreener();
  render();
}

// Triggered by "Import Finviz CSV" button
function importFinvizCSV(ev){
  const file=ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const map=parseFinvizCSV(e.target.result);
      const count=Object.keys(map).length;
      if(count===0){alert('Parsed 0 rows — check CSV format (needs Ticker and Industry columns)');return;}
      if(!confirm(`Parsed ${count} tickers from Finviz CSV.\n\nThis will override FMP industry classifications for matched tickers in the current scan results AND all future scans.\n\nProceed?`))return;
      finvizMap=map;
      finvizMeta={imported:new Date().toISOString(),count};
      localStorage.setItem('velox_eq_finviz_map',JSON.stringify(finvizMap));
      localStorage.setItem('velox_eq_finviz_meta',JSON.stringify(finvizMeta));
      log(`Finviz map imported: ${count} tickers`,'ok');
      if(scanResults.length>0){
        remapWithFinviz();
        alert(`Finviz industries imported and applied.\n\n${count} tickers mapped. ${scanResults.filter(r=>finvizMap[r.ticker]).length} matched to current scan.`);
      } else {
        alert(`Finviz industries imported (${count} tickers). Will apply on next scan.`);
      }
    }catch(err){
      alert('Failed to parse CSV: '+err.message);
      log('Finviz import failed: '+err.message,'error');
    }
  };
  reader.readAsText(file);
  ev.target.value='';
}

function clearFinvizMap(){
  if(!confirm('Clear Finviz industry override map?\n\nFuture scans will use FMP industries. Existing scan results will NOT automatically revert — re-run scan to refresh.'))return;
  finvizMap={};finvizMeta={imported:null,count:0};
  localStorage.removeItem('velox_eq_finviz_map');
  localStorage.removeItem('velox_eq_finviz_meta');
  log('Finviz override map cleared','ok');
  render();
}
let journalData=JSON.parse(localStorage.getItem('velox_eq_journal')||'null')||{trades:[]};

// Compress full stock object to minimal keys for storage (41% smaller)
function compressStock(r){return{
  t:r.ticker,n:(r.name||'').slice(0,30),e:r.exchange||'',
  sec:r.sector||'',ind:r.industry||'',p:+r.price.toFixed(2),
  mc:Math.round((r.marketCap||0)/1e6),
  r1w:+(r.ret1w||0).toFixed(1),
  r1:+r.ret1m.toFixed(1),r3:+r.ret3m.toFixed(1),

// Math helpers
function ema(data,period){const k=2/(period+1);let e=data[0];const out=[e];for(let i=1;i<data.length;i++){e=data[i]*k+e*(1-k);out.push(e)}return out}
function sma(data,period){const out=new Array(period-1).fill(null);let sum=0;for(let i=0;i<period;i++)sum+=data[i];out.push(sum/period);for(let i=period;i<data.length;i++){sum=sum-data[i-period]+data[i];out.push(sum/period)}return out}
function rsi(closes,period=14){const gains=[],losses=[];for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1];gains.push(d>0?d:0);losses.push(d<0?-d:0)}let avgG=gains.slice(0,period).reduce((a,b)=>a+b,0)/period;let avgL=losses.slice(0,period).reduce((a,b)=>a+b,0)/period;const out=new Array(period).fill(null);out.push(avgL===0?100:100-100/(1+avgG/avgL));for(let i=period;i<gains.length;i++){avgG=(avgG*(period-1)+gains[i])/period;avgL=(avgL*(period-1)+losses[i])/period;out.push(avgL===0?100:100-100/(1+avgG/avgL))}return out}

// ═══════════════════════════════════════════════════════════════════════════
// WEINSTEIN STAGE ANALYSIS — days since last clean breakout above 150-SMA
// Stage 1→2 transition = stock was below 150-SMA (Stage 1 base), then closed
// above it and sustained for 5+ trading days. "Fresh" = crossed within last
// 4-8 weeks = prime entry zone. Returns null if no valid breakout in window.
// ═══════════════════════════════════════════════════════════════════════════
function daysSinceBaseBreakout(closes,sma150){
  const n=closes.length;
  if(n<180)return null;            // need enough history beyond the SMA
  const CONFIRM_DAYS=5;             // must sustain above for 5 days = confirmed cross
  const MAX_LOOKBACK=200;           // only look back ~10 months for recent transitions

  // Walk back from most recent bar. Find the most recent day where price was BELOW
  // SMA and the next day it was ABOVE, and it stayed above for CONFIRM_DAYS+ bars.
  // Returns trading days since that breakout.
  const start=Math.max(0,n-MAX_LOOKBACK);
  let lastCrossIdx=-1;
  for(let i=n-1;i>=start+1;i--){
    if(sma150[i]===null||sma150[i-1]===null)continue;
    const above=closes[i]>sma150[i];
    const prevAbove=closes[i-1]>sma150[i-1];
    if(above&&!prevAbove){
      // Potential cross. Check next CONFIRM_DAYS bars stayed above (or close to it — allow 1 violation)
      let sustained=0;
      let violations=0;
      for(let j=i;j<Math.min(n,i+CONFIRM_DAYS);j++){
        if(closes[j]>sma150[j])sustained++;
        else violations++;
      }
      if(sustained>=CONFIRM_DAYS-1&&violations<=1){
        lastCrossIdx=i;
        // Don't break — keep searching forward to find THE MOST RECENT clean cross
        // (actually we're walking backward from present, so the first clean cross we
        // find is the most recent. But we want to also check: did price then break
        // BACK below for 10+ days after? If so, this isn't the active breakout)
      }
    }
  }
  if(lastCrossIdx<0)return null;

  // Also check the stock is currently above the SMA (trend still intact)
  if(closes[n-1]<=sma150[n-1])return null;

  // Check we haven't had a sustained break-below since the cross
  let brokenBelow=0;
  for(let j=lastCrossIdx;j<n;j++){
    if(closes[j]<sma150[j])brokenBelow++;
    else brokenBelow=0;
    if(brokenBelow>=10)return null;  // broke below for 10+ days = not a valid active breakout
  }

  return n-1-lastCrossIdx;           // trading days since breakout
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function fmt(n,d=2){return(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtPct(n){return(n>=0?'+':'')+fmt(n,1)+'%'}

// Process a single stock's OHLCV into screener result
function processStock(ticker,info,hist){
  if(!hist||hist.length<63)return null;
  const closes=hist.map(d=>d.close);
  const highs=hist.map(d=>d.high||d.close);
  const lows=hist.map(d=>d.low||d.close);
  const volumes=hist.map(d=>d.volume||0);
  const n=closes.length;const cl=closes[n-1];
  if(!cl||cl<0.01)return null;

  // Returns
  const ret1w=n>=6?(cl/closes[n-6]-1)*100:0;
  const ret1m=n>=21?(cl/closes[n-21]-1)*100:0;
  const ret3m=n>=63?(cl/closes[n-63]-1)*100:0;
  const ret6m=n>=126?(cl/closes[n-126]-1)*100:0;
  const ret9m=n>=189?(cl/closes[n-189]-1)*100:0;
  const ret12m=n>=252?(cl/closes[n-252]-1)*100:(n>=200?(cl/closes[0]-1)*100:0);
  const rsRaw=ret12m*0.40+ret6m*0.25+ret3m*0.20+ret1m*0.15;
  // Emerging composite — weights short-term windows heavily (spots new uptrends)
  const rsEmerging=ret1w*0.30+ret1m*0.30+ret3m*0.25+ret6m*0.15;
  // Confirmed composite — balanced across windows up to 9m (skips 12m so very-old trends don't dominate)
  const rsConfirmed=ret1w*0.15+ret1m*0.25+ret3m*0.30+ret6m*0.20+ret9m*0.10;

  // EMAs
  const e21arr=ema(closes,21),e50arr=ema(closes,50),e200arr=ema(closes,200);
  const e21=e21arr[n-1],e50=e50arr[n-1],e200=e200arr[n-1];

  // 150-SMA (30-week) for Weinstein Stage Analysis
  const sma150arr=sma(closes,150);
  const daysSinceBreakout=daysSinceBaseBreakout(closes,sma150arr);

  // RSI
  const rsiArr=rsi(closes,14);const rsiVal=rsiArr[rsiArr.length-1]||50;

  // Ranges
  const h10=Math.max(...highs.slice(-10)),l10=Math.min(...lows.slice(-10));
  const h20=Math.max(...highs.slice(-20)),l20=Math.min(...lows.slice(-20));
  const h50=Math.max(...highs.slice(-50)),l50=Math.min(...lows.slice(-50));
  const range10=h10-l10,range20=h20-l20,range50=h50-l50;

  // Volume
  const vol20=volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
  const volRatio=vol20>0?volumes[n-1]/vol20:1;

  // Trend
  const trendValid=cl>e50&&e50>e200&&cl>e200;
  let ts=0;
  if(cl>e21)ts++;if(cl>e50)ts++;if(cl>e200)ts++;
  if(e21>e50)ts++;if(e50>e200)ts++;
  if(n>5&&e21arr[n-1]>e21arr[n-6])ts++;
  if(n>5&&e50arr[n-1]>e50arr[n-6])ts++;
  if(n>5&&e200arr[n-1]>e200arr[n-6])ts++;
  if(cl>(h20+l20)/2)ts++;
  if(rsiVal>50)ts++;

  // Distance metrics
  const pct21=(cl-e21)/e21*100,pct50=(cl-e50)/e50*100;
  const pct50H=(cl-h50)/h50*100;

  // Setup
  let setup='None';
  if(trendValid){
    const nearEma=Math.abs(pct21)<=3||Math.abs(pct50)<=4;
    if(nearEma&&rsiVal>=40&&rsiVal<=65){
      setup='Pullback';
    } else {
      const maxDepth=range50/h50*100;
      const contracts=range50>range20&&range20>range10;
      const nearHighs=cl>=(l50+(range50*0.5));
      const notDeep=maxDepth<25;
      if(contracts&&nearHighs&&notDeep)setup='VCP';
    }
  }

  // Industry/sector — Finviz override map takes precedence if available
  const fv=finvizMap[ticker];
  const resolvedSector=(fv&&fv.sector)||info.sector||'';
  const resolvedIndustry=(fv&&fv.industry)||info.industry||'Unknown';

  return{
    ticker,
    name:info.companyName||info.name||ticker,
    exchange:info.exchangeShortName||info.exchange||'',
    sector:resolvedSector,
    industry:resolvedIndustry,
    price:cl,
    marketCap:info.marketCap||0,
    avgVol:vol20,
    ret1w,ret1m,ret3m,ret6m,ret9m,ret12m,rsRaw,rsEmerging,rsConfirmed,
    rsScore:0,industryRS:0,indMedian:0,
    daysSinceBreakout,
    trendValid,trendScore:ts,
    rsiVal,pct21,pct50,pct50H,
    range10,range20,range50,volRatio,
    setup
  };
}

function calcRS(results){
  if(results.length<2)return;
  const sorted=[...results].sort((a,b)=>a.rsRaw-b.rsRaw);
  sorted.forEach((r,i)=>{r.rsScore=Math.round(i/(sorted.length-1)*100)});
}

function calcIndustryRS(results){
  const map={};
  results.forEach(r=>{if(!map[r.industry])map[r.industry]=[];map[r.industry].push(r.rsScore)});
  const medians={};
  Object.entries(map).forEach(([ind,scores])=>{
    scores.sort((a,b)=>a-b);
    const m=Math.floor(scores.length/2);
    medians[ind]=scores.length%2===0?(scores[m-1]+scores[m])/2:scores[m];
  });
  const indList=Object.entries(medians).sort((a,b)=>a[1]-b[1]);
  const ranks={};
  indList.forEach(([ind],i)=>{ranks[ind]=Math.round(i/(indList.length-1)*100)});
  results.forEach(r=>{r.industryRS=ranks[r.industry]||0;r.indMedian=medians[r.industry]||0});
}

// Industry-level aggregate stats — for the Givens-style table.
// Computes median return per time window, breadth (% trend-valid), and composite scores.
let industryStats=[];
function calcIndustryStats(results){
  const MIN_STOCKS=3; // skip industries with <3 members — too noisy
  const byInd={};
  results.forEach(r=>{
    if(!byInd[r.industry])byInd[r.industry]={industry:r.industry,sector:r.sector||'',stocks:[]};
    byInd[r.industry].stocks.push(r);
  });
  const median=arr=>{
    if(arr.length===0)return 0;
    const s=[...arr].sort((a,b)=>a-b);
    const m=Math.floor(s.length/2);
    return s.length%2===0?(s[m-1]+s[m])/2:s[m];
  };
  industryStats=Object.values(byInd)
    .filter(g=>g.stocks.length>=MIN_STOCKS&&g.industry&&g.industry!=='Unknown')
    .map(g=>{
      const stocks=g.stocks;
      const validCount=stocks.filter(s=>s.trendValid).length;
      return{
        industry:g.industry,
        sector:g.sector,
        count:stocks.length,
        breadth:Math.round((validCount/stocks.length)*100),
        ret1w:median(stocks.map(s=>s.ret1w)),
        ret1m:median(stocks.map(s=>s.ret1m)),
        ret3m:median(stocks.map(s=>s.ret3m)),
        ret6m:median(stocks.map(s=>s.ret6m)),
        ret9m:median(stocks.map(s=>s.ret9m)),
        ret12m:median(stocks.map(s=>s.ret12m)),
        rsEmerging:median(stocks.map(s=>s.rsEmerging)),
        rsConfirmed:median(stocks.map(s=>s.rsConfirmed)),
        rsRank:stocks.length>0?stocks[0].industryRS:0,
      };
    });
}

// Fetch universe from FMP — tries multiple endpoints
async function fetchUniverse(){
  const endpoints=[
    {name:'v3 stock-screener',url:`https://financialmodelingprep.com/api/v3/stock-screener?exchange=NYSE,NASDAQ&isActivelyTrading=true&priceMoreThan=2&limit=10000&apikey=${FMP_KEY}`},
    {name:'stable company-screener',url:`https://financialmodelingprep.com/stable/company-screener?exchange=NYSE,NASDAQ&priceMoreThan=2&limit=10000&apikey=${FMP_KEY}`},
    {name:'stable stock-screener',url:`https://financialmodelingprep.com/stable/stock-screener?exchange=NYSE,NASDAQ&limit=10000&apikey=${FMP_KEY}`}
  ];

  // Non-equity wrappers to exclude from the universe entirely.
  // Rationale: these distort RS rankings (thousands of mutual fund share classes
  // flood the distribution) and aren't investable under a concentrated single-name thesis.
  // Checked against both FMP and Finviz industry labels where available.
  const EXCLUDED_INDUSTRIES=[
    'Asset Management','Asset Management - Global','Asset Management - Income',
    'Closed-End Fund - Debt','Closed-End Fund - Equity','Closed-End Fund - Foreign',
    'Closed-End Fund - Income','Closed-End Fund - Other',
    'Exchange Traded Fund','Shell Companies',
  ];
  const excludedSet=new Set(EXCLUDED_INDUSTRIES.map(s=>s.toLowerCase().replace(/[—–-]/g,'-').trim()));
  const normInd=s=>(s||'').toLowerCase().replace(/[—–-]/g,'-').trim();

  for(const ep of endpoints){
    try{
      log(`Trying ${ep.name}...`);
      const res=await fetch(ep.url);
      if(!res.ok){log(`${ep.name} returned ${res.status}`,'warn');continue}
      const data=await res.json();
      if(data&&data['Error Message']){log(`API error: ${data['Error Message']}`,'error');continue}
      const arr=Array.isArray(data)?data:(data.data||data.results||[]);
      if(arr.length===0){log(`${ep.name} returned empty`,'warn');continue}
      log(`${ep.name} OK — ${arr.length} raw stocks`,'ok');

      // First pass — basic ticker/price sanity
      let filtered=arr.filter(s=>{
        const sym=s.symbol||s.ticker||'';
        const price=s.price||s.lastPrice||0;
        return price>=2 && sym && !sym.includes('.') && !sym.includes('-') && !sym.includes('/');
      });
      const before=filtered.length;

      // Second pass — exclude non-equity wrappers at source.
      // Uses Finviz industry if mapped (more accurate), falls back to FMP industry.
      const hasFinviz=Object.keys(finvizMap).length>0;
      filtered=filtered.filter(s=>{
        const sym=(s.symbol||s.ticker||'').toUpperCase();
        // Mutual fund share class heuristic: 5-letter ticker ending in X.
        // Catches VDADX, MDIZX etc. Rare false positives (SPGX, ARKX); worth the noise reduction.
        if(/^[A-Z]{4}X$/.test(sym))return false;
        // Resolve industry — Finviz first if available, else FMP
        const fvInd=hasFinviz&&finvizMap[sym]?finvizMap[sym].industry:null;
        const industry=fvInd||s.industry||'';
        if(excludedSet.has(normInd(industry)))return false;
        return true;
      });
      const after=filtered.length;
      log(`Filtered non-equity wrappers: ${before}→${after} (removed ${before-after} funds/CEFs/ETFs/shells)${hasFinviz?' using Finviz industry map':' using FMP industries only — import Finviz CSV for stricter filtering'}`,hasFinviz?'ok':'warn');

      // Normalize field names
      return filtered.map(s=>({
        symbol:s.symbol||s.ticker,
        companyName:s.companyName||s.name||'',
        exchange:s.exchangeShortName||s.exchange||'',
        exchangeShortName:s.exchangeShortName||s.exchange||'',
        sector:s.sector||'',
        industry:s.industry||'Unknown',
        price:s.price||s.lastPrice||0,
        marketCap:s.marketCap||0
      }));
    }catch(e){log(`${ep.name} failed: ${e.message}`,'error')}
  }
  throw new Error('All FMP endpoints failed — check API key, network, or try again');
}

// Fetch CANSLIM fundamentals — combines income statements, key metrics, earnings calendar
async function fetchFundamentals(ticker){
  const out={};
  try{
    // Quarterly income statements (last 5 = most recent + 4 quarters ago for YoY comparison)
    const qRes=await fetch(`https://financialmodelingprep.com/stable/income-statement?symbol=${ticker}&period=quarter&limit=5&apikey=${FMP_KEY}`);
    const qData=await qRes.json();
    if(Array.isArray(qData)&&qData.length>=5){
      const q0=qData[0],q4=qData[4];
      if(q4.eps&&q4.eps!==0){
        out.epsGrowthQ=((q0.eps-q4.eps)/Math.abs(q4.eps))*100;
      }
      if(q4.revenue&&q4.revenue!==0){
        out.salesGrowthQ=((q0.revenue-q4.revenue)/Math.abs(q4.revenue))*100;
      }
      out.lastEpsDate=q0.date;
    }
  }catch(e){}
  try{
    // Annual income statements (last 4 years for 3-yr growth)
    const aRes=await fetch(`https://financialmodelingprep.com/stable/income-statement?symbol=${ticker}&period=annual&limit=4&apikey=${FMP_KEY}`);
    const aData=await aRes.json();
    if(Array.isArray(aData)&&aData.length>=4){
      const a0=aData[0],a3=aData[3];
      if(a3.eps&&a3.eps>0){
        // 3yr CAGR
        out.epsGrowthA=(Math.pow(a0.eps/a3.eps,1/3)-1)*100;
      }
    }
  }catch(e){}
  try{
    // Key metrics for institutional ownership, float
    const kRes=await fetch(`https://financialmodelingprep.com/stable/key-metrics?symbol=${ticker}&period=annual&limit=1&apikey=${FMP_KEY}`);
    const kData=await kRes.json();
    if(Array.isArray(kData)&&kData[0]){
      // FMP doesn't always have institutional %, will use shares float as proxy for S
    }
  }catch(e){}
  try{
    // Company outlook / profile for institutional ownership
    const pRes=await fetch(`https://financialmodelingprep.com/stable/profile?symbol=${ticker}&apikey=${FMP_KEY}`);
    const pData=await pRes.json();
    if(Array.isArray(pData)&&pData[0]){
      const p=pData[0];
      out.float=p.floatShares||p.sharesOutstanding||0;
      out.floatM=out.float/1000000;
    }
  }catch(e){}
  try{
    // Institutional ownership
    const iRes=await fetch(`https://financialmodelingprep.com/stable/institutional-ownership?symbol=${ticker}&apikey=${FMP_KEY}`);
    const iData=await iRes.json();
    if(Array.isArray(iData)&&iData[0]){
      out.instOwn=iData[0].ownershipPercent||iData[0].institutionalOwnershipPercentage||0;
    }
  }catch(e){}
  try{
    // Next earnings date
    const eRes=await fetch(`https://financialmodelingprep.com/stable/earnings?symbol=${ticker}&apikey=${FMP_KEY}`);
    const eData=await eRes.json();
    if(Array.isArray(eData)){
      const today=new Date();
      const upcoming=eData.find(e=>new Date(e.date)>today);
      if(upcoming){
        out.nextEarnings=upcoming.date;
        out.daysToEarnings=Math.ceil((new Date(upcoming.date)-today)/(1000*60*60*24));
      }
    }
  }catch(e){}
  return out;
}

    if(universe.length===0){
      log('Universe is empty after filtering','error');
      setProgress('Empty universe — check filters or API',0,1,'');
      scanRunning=false;render();return;
    }

    // Test mode: take a random sample
    if(testLimit>0&&universe.length>testLimit){
      // Shuffle and take first N for representative sample
      universe=universe.sort(()=>Math.random()-0.5).slice(0,testLimit);
      log(`TEST MODE: limited to ${testLimit} random stocks`,'warn');
    }

    const total=universe.length;
    scanMeta={lastRun:null,total,processed:0,errors:0};
    const estMin=Math.round(total/BATCH_SIZE*(BATCH_MS/1000)/60);
    log(`Universe size: ${total} · Est time: ${estMin} min · Batch size: ${BATCH_SIZE} · Delay: ${BATCH_MS}ms`);
    setProgress(`Universe: ${total} stocks. Starting OHLCV fetch (~${estMin} min)...`,0,total,'');

    const results=[];
    for(let i=0;i<universe.length;i+=BATCH_SIZE){
      if(scanAbort){log('Scan aborted by user','warn');break}
      const batch=universe.slice(i,i+BATCH_SIZE);
      const batchResults=await Promise.all(batch.map(async stock=>{
        try{
          const hist=await fetchOHLCV(stock.symbol);
          return processStock(stock.symbol,stock,hist);
        }catch(e){
          scanMeta.errors++;
          if(scanMeta.errors<=10)log(`${stock.symbol}: ${e.message}`,'warn');
          return null;
        }
      }));
      batchResults.filter(Boolean).forEach(r=>results.push(r));
      scanMeta.processed=i+batch.length;
      const pct=Math.round(scanMeta.processed/total*100);
      const elapsed=(i/BATCH_SIZE+1)*(BATCH_MS/1000);
      const remaining=Math.round((total-scanMeta.processed)/BATCH_SIZE*(BATCH_MS/1000));
      const eta=remaining>60?Math.round(remaining/60)+'m ':remaining+'s ';
      setProgress(
        `Fetching OHLCV... ${scanMeta.processed}/${total} (${pct}%) — ETA ${eta}`,
        scanMeta.processed,total,
        `${results.length} valid · ${scanMeta.errors} errors`
      );
      // Log progress milestones
      if(scanMeta.processed%100===0||scanMeta.processed===total){
        log(`Progress: ${scanMeta.processed}/${total} · ${results.length} valid · ${scanMeta.errors} errors`);
      }
      await sleep(BATCH_MS);
    }

    log('Calculating RS rankings...','ok');
    setProgress('Calculating RS rankings across full universe...',total,total,'');
    calcRS(results);
    calcIndustryRS(results);
    calcIndustryStats(results);
    scanResults=results;
    scanMeta.lastRun=new Date().toISOString();
    saveScreener();
    const vcpCount=results.filter(r=>r.setup==='VCP').length;
    const pbCount=results.filter(r=>r.setup==='Pullback').length;
    log(`Phase 1 complete: ${results.length} ranked · ${vcpCount} VCPs · ${pbCount} Pullbacks`,'ok');
    
    // PHASE 2: CANSLIM fundamentals for RS >= 80
    if(!scanAbort){
      const candidates=results.filter(r=>r.rsScore>=80);
      log(`Phase 2 starting: fetching CANSLIM fundamentals for ${candidates.length} stocks (RS ≥ 80)`,'ok');
      const fundMin=Math.round(candidates.length/BATCH_SIZE*(BATCH_MS/1000)/60);
      setProgress(`Phase 2: Fetching fundamentals for ${candidates.length} stocks (~${fundMin} min)...`,0,candidates.length,'');
      
      let fundProcessed=0;let fundErrors=0;
      for(let i=0;i<candidates.length;i+=BATCH_SIZE){
        if(scanAbort){log('Phase 2 aborted','warn');break}
        const batch=candidates.slice(i,i+BATCH_SIZE);
        await Promise.all(batch.map(async stock=>{
          try{
            const fund=await fetchFundamentals(stock.ticker);
            Object.assign(stock,fund);
          }catch(e){
            fundErrors++;
            if(fundErrors<=10)log(`Fund ${stock.ticker}: ${e.message}`,'warn');
          }
        }));
        fundProcessed=i+batch.length;
        const pct=Math.round(fundProcessed/candidates.length*100);
        const remaining=Math.round((candidates.length-fundProcessed)/BATCH_SIZE*(BATCH_MS/1000));
        const eta=remaining>60?Math.round(remaining/60)+'m ':remaining+'s ';
        setProgress(
          `Phase 2: ${fundProcessed}/${candidates.length} (${pct}%) — ETA ${eta}`,
          fundProcessed,candidates.length,
          `${fundErrors} errors`
        );
        if(fundProcessed%50===0||fundProcessed===candidates.length){
          log(`Fundamentals: ${fundProcessed}/${candidates.length} · ${fundErrors} errors`);
        }
        await sleep(BATCH_MS);
      }
      saveScreener();
      const withFund=results.filter(r=>r.epsGrowthQ!=null).length;
      log(`COMPLETE: ${withFund} stocks have CANSLIM data`,'ok');
      setProgress(`All complete. ${results.length} ranked · ${withFund} with fundamentals.`,1,1,'');
    }
  }catch(e){
    log('Scan error: '+e.message,'error');
    setProgress('Scan error: '+e.message,0,1,'');
  }
  scanRunning=false;
  render();
}

function setProgress(msg,current,total,sub){
  const el=document.getElementById('scanProg');
  if(!el)return;
  const pct=total>0?Math.round(current/total*100):0;
  el.innerHTML=`<div class="prog-label">${msg}</div>
<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
${sub?`<div class="prog-stats"><div class="prog-stat">${sub}</div></div>`:''}`;
}

// Filtered and sorted results
function getFiltered(){
  let d=scanResults.slice();
  if(screenerFilter.minRS)d=d.filter(r=>r.rsScore>=screenerFilter.minRS);
  if(screenerFilter.minIndRS)d=d.filter(r=>r.industryRS>=screenerFilter.minIndRS);
  if(screenerFilter.setup!=='all')d=d.filter(r=>r.setup===screenerFilter.setup);
  if(screenerFilter.trendOnly)d=d.filter(r=>r.trendValid);
  if(screenerFilter.minPrice>0)d=d.filter(r=>r.price>=screenerFilter.minPrice);
  if(screenerFilter.maxPrice>0)d=d.filter(r=>r.price<=screenerFilter.maxPrice);
  if(screenerFilter.minMcap>0)d=d.filter(r=>(r.marketCap||0)>=screenerFilter.minMcap*1e6);
  // CANSLIM — stocks missing data fail filters when threshold > 0
  if(screenerFilter.canslim){
    if(screenerFilter.minEpsGrowthQ)d=d.filter(r=>r.epsGrowthQ!=null&&r.epsGrowthQ>=screenerFilter.minEpsGrowthQ);
    if(screenerFilter.minEpsGrowthA)d=d.filter(r=>r.epsGrowthA!=null&&r.epsGrowthA>=screenerFilter.minEpsGrowthA);
    if(screenerFilter.maxFromHigh)d=d.filter(r=>r.pct50H!=null&&Math.abs(r.pct50H)<=screenerFilter.maxFromHigh);
    if(screenerFilter.maxFloatM)d=d.filter(r=>r.floatM!=null&&r.floatM>0&&r.floatM<=screenerFilter.maxFloatM);
    if(screenerFilter.minInstOwn)d=d.filter(r=>r.instOwn!=null&&r.instOwn>=screenerFilter.minInstOwn);
    if(screenerFilter.minDaysToEarnings)d=d.filter(r=>r.daysToEarnings!=null&&r.daysToEarnings>=screenerFilter.minDaysToEarnings);
  }
  // Stage 1→2 transition filters — finds emerging leaders before they're obvious.
  // Signal we're after: dead for a year, just turned up, RS in the 60-85 range, fresh base breakout.
  if(screenerFilter.stage12){
    if(screenerFilter.max12m!=null)d=d.filter(r=>r.ret12m<=screenerFilter.max12m);
    if(screenerFilter.min1m!=null)d=d.filter(r=>r.ret1m>=screenerFilter.min1m);
    if(screenerFilter.maxDaysBreakout!=null)d=d.filter(r=>r.daysSinceBreakout!=null&&r.daysSinceBreakout<=screenerFilter.maxDaysBreakout);
    if(screenerFilter.maxRS!=null)d=d.filter(r=>r.rsScore<=screenerFilter.maxRS);
    // Exclude non-equity wrappers — mutual funds, CEFs, ETFs, asset-manager fund products.
    // These are not investable under a concentrated single-name thesis.
    if(screenerFilter.excludeFunds!==false){
      const JUNK_INDUSTRIES=[
        'Asset Management','Asset Management - Global','Asset Management - Income',
        'Closed-End Fund - Debt','Closed-End Fund - Equity','Closed-End Fund - Foreign',
        'Closed-End Fund - Income','Closed-End Fund - Other',
        'Exchange Traded Fund','Shell Companies','Mortgage Finance',
      ];
      const junkSet=new Set(JUNK_INDUSTRIES.map(s=>s.toLowerCase().replace(/[—–-]/g,'-').trim()));
      d=d.filter(r=>{
        const ind=(r.industry||'').toLowerCase().replace(/[—–-]/g,'-').trim();
        if(junkSet.has(ind))return false;
        // Mutual fund share classes: 5-letter ticker ending in X (e.g. VDADX, MDIZX).
        // Catches ~95% of mutual fund noise. False positives are rare (ARKX, SPGX etc.).
        if(/^[A-Z]{4}X$/.test(r.ticker))return false;
        return true;
      });
    }
  }
  // Sub-tab filter
  if(screenerSubTab==='setups')d=d.filter(r=>r.setup!=='None');
  else if(screenerSubTab==='vcp')d=d.filter(r=>r.setup==='VCP');
  else if(screenerSubTab==='pullback')d=d.filter(r=>r.setup==='Pullback');
  // Sort
  d.sort((a,b)=>{
    const av=a[sortCol]||0,bv=b[sortCol]||0;
    return sortDir==='desc'?bv-av:av-bv;
  });
  return d;
}

function rsColor(n){return n>=70?'rs-hi':n>=40?'rs-mid':'rs-lo'}
function setupBadge(s){
  if(s==='VCP')return'<span class="badge badge-blue">VCP</span>';
  if(s==='Pullback')return'<span class="badge badge-green">Pullback</span>';
  return'<span class="badge badge-grey">—</span>';
}
function sortTh(col,label){
  const arrow=sortCol===col?(sortDir==='desc'?'↓':'↑'):'';
  return`<th onclick="setSort('${col}')">${label}${arrow}</th>`;
}

// User overrides persisted to localStorage. Versioned so breaking changes
// (e.g. Finviz-taxonomy migration) can force a refresh from defaults.
const THEME_MAPPING_VERSION=2;
let themeIndustries=(()=>{
  try{
    const savedVersion=parseInt(localStorage.getItem('velox_eq_theme_industries_v'))||0;
    const saved=localStorage.getItem('velox_eq_theme_industries');
    if(saved&&savedVersion>=THEME_MAPPING_VERSION)return JSON.parse(saved);
    // Version older than current → reseed. User's custom edits lost here, but
    // that's acceptable for the Finviz taxonomy migration — the old names don't match anyway.
    localStorage.setItem('velox_eq_theme_industries_v',String(THEME_MAPPING_VERSION));
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_THEME_INDUSTRIES));
})();

function saveThemeIndustries(){
  try{
    localStorage.setItem('velox_eq_theme_industries',JSON.stringify(themeIndustries));
    localStorage.setItem('velox_eq_theme_industries_v',String(THEME_MAPPING_VERSION));
  }catch(e){}
}

// Given a theme's industry list, return matched entries from industryStats
function matchIndustries(themeCode){
  const t=themeIndustries[themeCode];
  if(!t||!t.industries.length)return[];
  // Case-insensitive match, since FMP sometimes uses em-dash vs hyphen etc.
  const normalise=s=>(s||'').toLowerCase().replace(/[—–-]/g,'-').replace(/\s+/g,' ').trim();
  const wanted=new Set(t.industries.map(normalise));
  return industryStats.filter(ind=>wanted.has(normalise(ind.industry)));
}

// Derive a conviction score for a theme based on its backing industries.
// Output: {score: 0-100, verdict: "flowing"|"watch"|"wait"|"fading"|"nodata", reasons: []}
function themeConviction(themeCode){
  const matches=matchIndustries(themeCode);
  if(matches.length===0)return{score:0,verdict:'nodata',reasons:['No backing industries found in scan'],matches:[]};

  // Take the best-performing backing industry (max Confirmed score)
  // but weight by breadth — a narrow uptrend deserves less conviction
  const scored=matches.map(m=>{
    const breadthFactor=m.breadth/100;
    const weightedConfirmed=m.rsConfirmed*breadthFactor;
    const weightedEmerging=m.rsEmerging*breadthFactor;
    return{...m,weightedConfirmed,weightedEmerging};
  }).sort((a,b)=>b.weightedConfirmed-a.weightedConfirmed);

  const best=scored[0];
  const avgEmerging=matches.reduce((s,m)=>s+m.rsEmerging,0)/matches.length;
  const avgConfirmed=matches.reduce((s,m)=>s+m.rsConfirmed,0)/matches.length;
  const avgBreadth=matches.reduce((s,m)=>s+m.breadth,0)/matches.length;

  const reasons=[];
  let verdict='wait';

  // FLOWING IN: strong confirmed + strong emerging + decent breadth
  if(best.rsConfirmed>=15&&best.rsEmerging>=10&&best.breadth>=50){
    verdict='flowing';
    reasons.push(`${best.industry}: ${best.rsConfirmed.toFixed(0)} confirmed / ${best.rsEmerging.toFixed(0)} emerging / ${best.breadth}% breadth`);
  }
  // FADING: confirmed still positive but emerging rolling over
  else if(best.rsConfirmed>=10&&best.rsEmerging<0){
    verdict='fading';
    reasons.push(`${best.industry}: confirmed +${best.rsConfirmed.toFixed(0)} but emerging turning negative (${best.rsEmerging.toFixed(0)})`);
  }
  // WATCH: positive but mixed or insufficient breadth
  else if(best.rsConfirmed>=8||(best.rsEmerging>=5&&best.breadth>=40)){
    verdict='watch';
    reasons.push(`${best.industry}: mixed signal — confirmed ${best.rsConfirmed.toFixed(0)}, emerging ${best.rsEmerging.toFixed(0)}, breadth ${best.breadth}%`);
  }
  // WAIT: weak
  else{
    verdict='wait';
    reasons.push(`${best.industry}: weak — confirmed ${best.rsConfirmed.toFixed(0)}, breadth ${best.breadth}%`);
  }

  // Composite conviction score (0-100, arbitrary scale for ranking themes)
  const score=Math.max(0,Math.min(100,(best.rsConfirmed*2)+(best.rsEmerging*1.5)+(best.breadth*0.5)));

  return{score,verdict,reasons,matches:scored,best,avgEmerging,avgConfirmed,avgBreadth};
}

// Find top candidate stocks within a theme's backing industries.
// Filter: RS score >= 75, trend score >= 6, setup in [VCP, Pullback], trendValid
function topCandidatesForTheme(themeCode,limit=5){
  const matches=matchIndustries(themeCode);
  if(matches.length===0)return[];
  const industryNames=new Set(matches.map(m=>m.industry));
  return scanResults
    .filter(s=>industryNames.has(s.industry))
    .filter(s=>s.rsScore>=75&&s.trendScore>=6&&s.trendValid)
    .sort((a,b)=>{
      // Prioritise clean setups
      const setupRank=s=>s.setup==='VCP'?2:s.setup==='Pullback'?1:0;
      const sa=setupRank(a),sb=setupRank(b);
      if(sa!==sb)return sb-sa;
      return b.rsScore-a.rsScore;
    })
    .slice(0,limit);
}

function verdictLabel(v){
  return{flowing:'FLOWING IN',watch:'WATCH',wait:'WAIT',fading:'FADING',nodata:'NO DATA'}[v]||v.toUpperCase();
}
function verdictColor(v){
  return{flowing:'var(--green)',watch:'var(--amber)',wait:'var(--text2)',fading:'var(--red)',nodata:'var(--text2)'}[v];
}

function editThemeIndustries(themeCode){
  const t=themeIndustries[themeCode];
  if(!t)return;
  const current=t.industries.join(', ');
  const next=prompt(`Industries backing "${t.label}"\n\nComma-separated. Match FMP industry names exactly (case-sensitive).\nLeave blank to remove all.\n\nCurrent: ${current||'(none)'}`,current);
  if(next===null)return;
  t.industries=next.split(',').map(s=>s.trim()).filter(Boolean);
  saveThemeIndustries();
  render();
}

function renderStats(){
  const closed=journalData.trades.filter(t=>t.status==='closed');
  const open=journalData.trades.filter(t=>t.status==='open');
  if(closed.length===0)return'<div class="empty">No closed trades yet</div>';
  const wins=closed.filter(t=>(t.pnl||0)>0);
  const losses=closed.filter(t=>(t.pnl||0)<0);
  const totalPnl=closed.reduce((s,t)=>s+(t.pnl||0),0);
  const floatPnl=open.reduce((s,t)=>s+(t.floatPnl||0),0);
  const avgWin=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((s,t)=>s+t.pnl,0)/losses.length:0;
  const winRate=closed.length?wins.length/closed.length*100:0;
  const expectancy=closed.length?totalPnl/closed.length:0;
  const profitFactor=losses.length&&wins.length?Math.abs(wins.reduce((s,t)=>s+t.pnl,0)/losses.reduce((s,t)=>s+t.pnl,0)):0;
  const rs=closed.map(t=>t.riskAmt?t.pnl/t.riskAmt:0);
  const bestR=rs.length?Math.max(...rs):0;
  const worstR=rs.length?Math.min(...rs):0;

  // P&L curve
  let running=0;const pts=[0];
  closed.sort((a,b)=>new Date(a.closeDate)-new Date(b.closeDate)).forEach(t=>{running+=(t.pnl||0);pts.push(running)});
  const maxP=Math.max(...pts,1);const minP=Math.min(...pts,-1);
  const range=maxP-minP||1;const W=600;const H=120;
  const stepX=W/(pts.length-1||1);
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${i*stepX},${H-((p-minP)/range)*H}`).join(' ');
  const zeroY=H-((0-minP)/range)*H;

  return`<div class="stats-grid">
<div class="stat"><div class="lbl">Realized P&L</div><div class="val" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${totalPnl>=0?'+':''}$${fmt(totalPnl,0)}</div></div>
<div class="stat"><div class="lbl">Floating P&L</div><div class="val" style="color:${floatPnl>=0?'var(--green)':'var(--red)'}">${floatPnl>=0?'+':''}$${fmt(floatPnl,0)}</div></div>
<div class="stat"><div class="lbl">Trades</div><div class="val">${closed.length}</div></div>
<div class="stat"><div class="lbl">Win Rate</div><div class="val" style="color:${winRate>=50?'var(--green)':'var(--red)'}">${winRate.toFixed(0)}%</div></div>
<div class="stat"><div class="lbl">Avg Win</div><div class="val" style="color:var(--green)">+$${fmt(avgWin,0)}</div></div>
<div class="stat"><div class="lbl">Avg Loss</div><div class="val" style="color:var(--red)">$${fmt(avgLoss,0)}</div></div>
<div class="stat"><div class="lbl">Expectancy</div><div class="val" style="color:${expectancy>=0?'var(--green)':'var(--red)'}">${expectancy>=0?'+':''}$${fmt(expectancy,0)}</div></div>
<div class="stat"><div class="lbl">Profit Factor</div><div class="val" style="color:${profitFactor>=1.5?'var(--green)':profitFactor>=1?'var(--amber)':'var(--red)'}">${profitFactor.toFixed(2)}</div></div>
<div class="stat"><div class="lbl">Best Trade</div><div class="val" style="color:var(--green)">+${bestR.toFixed(1)}R</div></div>
<div class="stat"><div class="lbl">Worst Trade</div><div class="val" style="color:var(--red)">${worstR.toFixed(1)}R</div></div>
</div>
<div class="curve"><h4>P&L Curve</h4>
<svg viewBox="0 0 ${W} ${H+16}" style="width:100%;height:auto">
<line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="var(--border)" stroke-width="1"/>
<path d="${pathD}" fill="none" stroke="${running>=0?'var(--green)':'var(--red)'}" stroke-width="2"/>
<text x="4" y="${zeroY-4}" fill="var(--text2)" font-size="9" font-family="var(--mono)">$0</text>
<text x="${W-4}" y="${H+12}" fill="var(--text2)" font-size="9" font-family="var(--mono)" text-anchor="end">${running>=0?'+':''}$${fmt(running,0)}</text>
</svg></div>`;
}

// Journal actions
function addTrade(){
  const ticker=(document.getElementById('f_ticker').value||'').trim().toUpperCase();
  if(!ticker){alert('Ticker required');return}
  const entry=parseFloat(document.getElementById('f_entry').value);
  const stop=parseFloat(document.getElementById('f_stop').value);
  const shares=parseFloat(document.getElementById('f_shares').value)||0;
  const manualRisk=parseFloat(document.getElementById('f_risk').value)||0;
  const riskAmt=manualRisk||(shares&&entry&&stop?Math.abs((entry-stop)*shares):0);
  const trade={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    ticker,
    name:document.getElementById('f_name').value,
    exchange:document.getElementById('f_exch').value,
    direction:document.getElementById('f_dir').value,
    entry,stop,shares,riskAmt,
    thesis:document.getElementById('f_thesis').value,
    date:document.getElementById('f_date').value,
    status:'open',floatPnl:0
  };
  journalData.trades.push(trade);saveJournal();render();
}

function updateFloat(id,val){
  const t=journalData.trades.find(t=>t.id===id);
  if(t){t.floatPnl=parseFloat(val)||0;saveJournal()}
}

function closeTrade(id){
  const t=journalData.trades.find(t=>t.id===id);
  if(!t)return;
  const pnlStr=prompt(`Close ${t.ticker}\nEnter realized P&L ($):`);
  if(pnlStr===null)return;
  const exitStr=prompt('Exit price:');
  t.status='closed';
  t.pnl=parseFloat(pnlStr)||0;
  t.exitPrice=parseFloat(exitStr)||0;
  t.closeDate=new Date().toISOString().slice(0,10);
  t.floatPnl=0;
  saveJournal();render();
}

// Stage 1→2 preset — one-click setup for hunting late Stage 1 / early Stage 2 names.
// Based on Weinstein stage analysis + the criteria discussed for finding "next RKLB" style setups.
// Disables CANSLIM because emerging stocks often have messy fundamentals at the inflection.
function applyStage12Preset(){
  screenerFilter.stage12=true;
  screenerFilter.max12m=30;       // dead money for a year (< +30% 12M)
  screenerFilter.min1m=5;          // just showing thrust (> +5% 1M)
  screenerFilter.maxDaysBreakout=60; // crossed above 150-SMA within last ~12 weeks
  screenerFilter.maxRS=85;         // leader-in-waiting, not established leader
  screenerFilter.excludeFunds=true;  // no mutual funds, CEFs, shell companies
  // Relax other filters that would exclude emerging names
  screenerFilter.minRS=50;         // lowered from 80 (emerging names haven't earned RS 80 yet)
  screenerFilter.minPrice=5;       // filter out penny-stock junk
  screenerFilter.setup='VCP';      // only tight base formations
  screenerFilter.trendOnly=true;   // structural uptrend in place (trendValid = price>EMA50>EMA200)
  screenerFilter.canslim=false;    // fundamentals often noisy at inflection — disable
  screenerSubTab='all';            // show all, not just setups
  // Sort by daysSinceBreakout ascending = freshest first
  sortCol='daysSinceBreakout';
  sortDir='asc';
  render();
}

// Build a human-readable list of active filters. Shows at top of results so you
// always know what's filtering the output — no hidden filters.
function activeFiltersSummary(){
  const parts=[];
  const f=screenerFilter;
  if(f.minRS>0)parts.push(`RS≥${f.minRS}`);
  if(f.minIndRS>0)parts.push(`Ind RS≥${f.minIndRS}`);
  if(f.setup!=='all')parts.push(`Setup=${f.setup}`);
  if(f.trendOnly)parts.push('Trend Valid');
  if(f.minPrice>0)parts.push(`Price≥$${f.minPrice}`);
  if(f.maxPrice>0)parts.push(`Price≤$${f.maxPrice}`);
  if(f.minMcap>0)parts.push(`Mcap≥$${f.minMcap}M`);
  if(f.canslim){
    const canslimParts=[];
    if(f.minEpsGrowthQ)canslimParts.push(`EPSQ≥${f.minEpsGrowthQ}%`);
    if(f.minEpsGrowthA)canslimParts.push(`EPS3Y≥${f.minEpsGrowthA}%`);
    if(f.maxFromHigh)canslimParts.push(`%Hi≤${f.maxFromHigh}%`);
    if(f.maxFloatM)canslimParts.push(`Float≤${f.maxFloatM}M`);
    if(f.minInstOwn)canslimParts.push(`Inst≥${f.minInstOwn}%`);
    if(f.minDaysToEarnings)canslimParts.push(`Earn≥${f.minDaysToEarnings}d`);
    parts.push(`<span style="color:var(--green)">CANSLIM</span>${canslimParts.length?' ('+canslimParts.join(',')+')':''}`);
  }
  if(f.stage12){
    const s12Parts=[];
    if(f.max12m!=null)s12Parts.push(`12M≤${f.max12m}%`);
    if(f.min1m!=null)s12Parts.push(`1M≥${f.min1m}%`);
    if(f.maxDaysBreakout!=null)s12Parts.push(`DSB≤${f.maxDaysBreakout}d`);
    if(f.maxRS!=null)s12Parts.push(`RS≤${f.maxRS}`);
    if(f.excludeFunds!==false)s12Parts.push('no funds');
    parts.push(`<span style="color:#6bb4ff">Stage 1→2</span>${s12Parts.length?' ('+s12Parts.join(',')+')':''}`);
  }
  if(screenerSubTab==='setups')parts.push('Setups only');
  else if(screenerSubTab==='vcp')parts.push('VCP only');
  else if(screenerSubTab==='pullback')parts.push('Pullback only');
  return parts;
}

document.getElementById('tabs').addEventListener('click',e=>{
  if(e.target.classList.contains('tab')){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');
    currentTab=e.target.dataset.tab;
    render();
  }
});

render();

if('serviceWorker' in navigator){
  const sw=`const C='velox-equity-v1';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(C).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match(self.location.pathname)))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
}
</script>
